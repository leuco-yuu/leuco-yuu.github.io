baseURL: https://leuco.github.io/
title: Leuco Blog
theme: hugo-narrow
defaultContentLanguage: zh-hans
locale: zh-Hans
hasCJKLanguage: true
enableEmoji: true

mainSections:
  - posts

permalinks:
  posts: /posts/:slug/
  projects: /projects/:slug/
  pages: /:slug/

pagination:
  pagerSize: 6
  path: page

taxonomies:
  category: categories
  tag: tags
  series: series

markup:
  tableOfContents:
    startLevel: 1
    endLevel: 4
    ordered: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      extras:
        delete:
          enable: true
        insert:
          enable: true
        mark:
          enable: true
        subscript:
          enable: true
        superscript:
          enable: true
      passthrough:
        enable: true
        delimiters:
          block:
            - ['$$', '$$']
            - ['\[', '\]']
          inline:
            - ['$', '$']
            - ['\(', '\)']
      strikethrough: true
  highlight:
    codeFences: true
    guessSyntax: false
    lineNos: false
    lineNumbersInTable: false
    noClasses: false
    style: github
    tabWidth: 2

outputs:
  home:
    - HTML
    - RSS
    - JSON
    - WebAppManifest

outputFormats:
  WebAppManifest:
    mediaType: application/manifest+json
    baseName: site
    isPlainText: true

menus:
  main:
    - name: 文章
      pageRef: /posts
      weight: 10
      params:
        icon: posts
    - name: 分类
      pageRef: /categories
      weight: 20
      params:
        icon: categories
    - name: 系列
      pageRef: /series
      weight: 30
      params:
        icon: bookmark
    - name: 项目
      pageRef: /projects
      weight: 40
      params:
        icon: projects
    - name: 更多
      weight: 50
      params:
        icon: layers
    - name: 归档
      pageRef: /archives
      parent: 更多
      weight: 1
      params:
        icon: archive
    - name: 标签
      pageRef: /tags
      parent: 更多
      weight: 2
      params:
        icon: tags
  social:
    - name: GitHub
      url: https://github.com/leuco
      weight: 10
      params:
        icon: github
    - name: FaceBook
      url: https://www.facebook.com/leuco
      weight: 20
      params:
        icon: facebook
    - name: Twitter
      url: https://twitter.com/leuco
      weight: 30
      params:
        icon: twitter
    - name: Gmail
      url: mailto:leuco@gmail.com
      weight: 40
      params:
        icon: gmail
    - name: 163mail
      url: mailto:leuco@163.com
      weight: 50
      params:
        icon: 163mail
    - name: RSS
      url: /index.xml
      weight: 60
      params:
        icon: rss

params:
  description: 个人博客、项目记录和长期写作归档。
  keywords:
    - Blog
    - Hugo
    - Leuco
  defaultAuthor: leuco
  language: zh-CN
  shortName: Leuco Blog
  images:
    - /images/avatar.jpg
  favicon:
    svg: /favicon.svg
  author:
    name: leuco
    title: 写作、技术与项目记录
    description: 这里记录文章、项目和一些持续整理的主题。
    avatar: /images/avatar.jpg
    social:
      - name: GitHub
        url: https://github.com/leuco
        icon: github
      - name: FaceBook
        url: https://www.facebook.com/leuco
        icon: facebook
      - name: Twitter
        url: https://twitter.com/leuco
        icon: twitter
      - name: Gmail
        url: mailto:leuco@gmail.com
        icon: gmail
      - name: 163mail
        url: mailto:leuco@163.com
        icon: 163mail
      - name: RSS
        url: /index.xml
        icon: rss
  header:
    sticky: true
    logo:
      image: /images/avatar.jpg
      link: /
    showThemeSwitch: true
    showDarkModeSwitch: true
    showLanguageSwitch: false
    languageSwitchMode: dropdown
  dock: always
  immersiveMode:
    enabled: true
    default: false
    idleDelay: 2000
  contentWidth: 56rem
  toc:
    enabled: true
    position: center
  headingNumbering:
    enabled: true
    maxDepth: 4
    base: first-content-heading
    levelOneStyle: chinese
    levelOneSuffix: "、"
    decimalSeparator: "."
    space: " "
  colorScheme: default
  themes:
    default:
      name: Default
      order: 1
    claude:
      name: Claude
      order: 2
    bumblebee:
      name: Bumblebee
      order: 3
    emerald:
      name: Emerald
      order: 4
    nord:
      name: Nord
      order: 5
    sunset:
      name: Sunset
      order: 6
    abyss:
      name: Abyss
      order: 7
    dracula:
      name: Dracula
      order: 8
    amethyst:
      name: Amethyst
      order: 9
    slate:
      name: Slate
      order: 10
    twitter:
      name: Twitter
      order: 11
    minimal:
      name: Minimal
      order: 12
  home:
    recentPostsCount: 5
    contentOrder:
      - author-section
      - page-content
      - recent-posts
      - featured-projects.html
  post:
    showRelated: true
    relatedPostsCount: 3
    license:
      show: true
      author: leuco
      name: CC BY-NC-SA 4.0
      description: 本文采用 CC BY-NC-SA 4.0 协议授权，转载请注明来源，非商业使用，并保持相同协议。
      url: https://creativecommons.org/licenses/by-nc-sa/4.0/
      displayName: CC BY-NC-SA 4.0
  comments:
    enabled: false
  analytics:
    enabled: false
  katex:
    enabled: true
    delimiters:
      - left: $$
        right: $$
        display: true
      - left: $
        right: $
        display: false
      - left: \(
        right: \)
        display: false
      - left: \[
        right: \]
        display: true
  mermaid:
    enabled: true
  gallery:
    enabled: true
    defaultLayout: justified
    gap: 10
    targetRowHeight: 200
    lastRowBehavior: center
    columnWidth: 200
    columns: 4
  lightbox:
    enabled: true
  codeblock:
    collapse:
      enabled: true
      defaultState: expanded
      autoCollapseLines: 30
      autoCollapseHeight: 400
      collapsedHeight: 120
  readingProgress:
    enabled: true
    showOnHomepage: false
  dateFormat:
    full: :date_full
    long: 2006-01-02
    medium: 2006-01-02
    short: 01-02
  timeFormat:
    full: :time_full
    long: 15:04:05
    medium: 15:04
    short: 15:04

module:
  hugoVersion:
    extended: true
    min: 0.158.0
