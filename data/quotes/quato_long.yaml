- title: 岁寒之后·晨钟
  内容: |-
    草木繁盛时很难看出谁真正耐寒，只有霜雪落下，松柏的青色才从热闹中显出；顺境中的承诺轻盈，困境中的选择才更接近品格的重量。

    不要急着在掌声里判断一个人，也不要因一时寒冷怀疑自己所有的坚持。有些价值需要漫长冬季才能被看见；当喧嚣退去，仍留在枝头的绿色，才是生命真正拥有的颜色。
  出处: 据《论语·子罕》意蕴化写
  作者: 孔子
