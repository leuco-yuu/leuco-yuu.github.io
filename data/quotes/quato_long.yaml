- title: 知止之岸·晨钟
  内容: |-
    船若只知道前进而不知道靠岸，辽阔的海也会成为无边的疲惫；欲望若没有尽头，拥有越多反而越难安宁；知止并非放弃追求，而是辨认真正值得抵达的地方，不让手段吞没初心。

    为工作设下结束，为争论保留退路，为获取划出足够的边界。懂得停下的人，才能完整看见一路所得；否则即使穿过万里风浪，也可能错过自己最初想守护的港湾。
  出处: 据《礼记·大学》思想化写
  作者: 曾子
- title: 知止之岸·远帆
