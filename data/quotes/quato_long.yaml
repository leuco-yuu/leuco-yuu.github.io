  出处: 原创·网络路由随想
  作者: 编者
- title: 垃圾回收·晨钟
  内容: |-
    系统若从不释放已经无用的对象，再广阔的内存也会被过去占满，直至无法容纳新的创造；人的心也会保留过期的羞愧、旧日的争辩和早已结束的关系，仿佛放下便等于否定曾经。

    辨认真正仍被需要的记忆，把不再服务于今日的负担温柔释放。遗忘不是清空人生，而是把有限的空间还给正在发生的事，让新的爱、知识与勇气有地方被创建。
