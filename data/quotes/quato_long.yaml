- title: 进化的长路·晨钟
  内容: |-
    生命没有预先写好的终点，它在环境、偶然与选择之间缓慢试探，把无数失败变成后来者身体里的智慧；适应不等于一味屈从，而是保留核心的同时，找到新的生存方式。

    当世界改变时，更新方法，学习新工具；不必为旧能力失效而羞愧。能够继续生长的生命，从来不是最骄傲地拒绝变化者，而是那些愿意倾听环境，又不轻易失去自身方向的人。
  出处: 据进化论思想诗意化写
  作者: 查尔斯·达尔文
- title: 进化的长路·远帆
  内容: |-
    适应不等于一味屈从，而是保留核心的同时，找到新的生存方式。生命没有预先写好的终点，它在环境、偶然与选择之间缓慢试探，把无数失败变成后来者身体里的智慧。

    能够继续生长的生命，从来不是最骄傲地拒绝变化者，而是那些愿意倾听环境，又不轻易失去自身方向的人；而我们能做的，是当世界改变时，更新方法，学习新工具；不必为旧能力失效而羞愧。
  出处: 据进化论思想诗意化写
  作者: 查尔斯·达尔文
