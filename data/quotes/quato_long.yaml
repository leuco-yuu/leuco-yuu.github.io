- title: 积微成山·晨钟
  内容: |-
    高山并不拒绝细小的尘土，长河也不轻视无名的水滴；宏大的事物，总在无人惊叹的重复里形成；我们常羡慕结果的壮阔，却忽略每一步都曾普通得近乎沉默。

    把远大的愿望拆成今日可做的一件事，让耐心替代焦虑，让习惯承担意志最疲惫的时刻。真正改变命运的，往往不是偶尔的奋力一跃，而是无数次无人注视时，仍愿意向前挪动半步。
  出处: 据《荀子·劝学》意蕴化写
  作者: 荀子
- title: 积微成山·远帆
  内容: |-
