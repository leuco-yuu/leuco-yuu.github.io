- title: 接口与分寸·晨钟
  内容: |-
    清晰的接口隐藏复杂，却不隐瞒承诺；它告诉外界可以得到什么，也说明哪些部分不应被随意触碰；成熟的人也需要这样的分寸：不必把所有伤口展示给每个人，却要对自己的承诺负责。

    说清能够给予的范围，也坦白暂时做不到的事情；减少模糊依赖，让关系不靠猜测维持。真正的可靠，不是无所不能，而是边界明确、行为一致，让别人知道何时可以依靠，又何时应各自站稳。
