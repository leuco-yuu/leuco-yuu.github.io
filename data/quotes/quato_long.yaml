    因此，不妨学会回望记录，也回望自己的日子；从重复的疲惫、迟疑与欢喜中，找到真正需要修正的那一行。到最后会明白，时间不会替我们解释一切，但诚实的记录会让混乱显出纹理，让下一次选择不再完全依赖运气。
