- title: 荒原中的自由·晨钟
  内容: |-
    世界有时沉默，不回答我们的追问；但沉默并不等于虚无，它也可能是一张等待书写的白纸；自由令人不安，因为它要求我们承担选择，而不能永远躲在环境与他人的背后。

    承认迷惘，仍做出诚实的决定；接受没有绝对保证，仍为后果负责。人的尊严并非来自命运给出完美剧本，而是在没有剧本的荒原上，仍愿意写下不伤害他人的下一行。
  出处: 据存在主义哲学思想化写
  作者: 让-保罗·萨特
- title: 荒原中的自由·远帆
  内容: |-
    自由令人不安，因为它要求我们承担选择，而不能永远躲在环境与他人的背后。世界有时沉默，不回答我们的追问；但沉默并不等于虚无，它也可能是一张等待书写的白纸。

    人的尊严并非来自命运给出完美剧本，而是在没有剧本的荒原上，仍愿意写下不伤害他人的下一行；而我们能做的，是承认迷惘，仍做出诚实的决定；接受没有绝对保证，仍为后果负责。
  出处: 据存在主义哲学思想化写
