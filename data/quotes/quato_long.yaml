- title: 海明威的冰山·灯影
  内容: |-
    海面上可见的文字只是冰山一角，真正的重量沉在水下；人的沉默也常携带未被说出的风暴。许多时候，简洁并不意味着浅薄，它要求我们删去炫耀，只留下最必要、最有力量的部分。

    因此，不妨说话时少一点装饰，多一点准确；理解别人时，不要只依据浮在表面的那几句话。到最后会明白，成熟的表达让语言保持克制，也让同理心潜入更深处，去触碰那些尚未找到词语的悲伤与勇气。
  出处: 据海明威“冰山理论”思想化写
  作者: 欧内斯特·海明威
- title: 海明威的冰山·新雪
  内容: |-
    简洁并不意味着浅薄，它要求我们删去炫耀，只留下最必要、最有力量的部分；海面上可见的文字只是冰山一角，真正的重量沉在水下；人的沉默也常携带未被说出的风暴。

