- title: 沙箱里的自由·晨钟
  内容: |-
    沙箱允许探索，也限制伤害；它告诉我们，自由并不总要以整个世界作为试验场；勇敢尝试固然可贵，但真正负责的创造，会先为失败准备边界，不让旁人替自己的好奇承担全部代价。

    在小范围验证想法，在可恢复的环境里犯错；让野心先经过测试，让承诺先经过现实。好的边界不会杀死创造，反而使创造走得更远，因为每一次跌倒都不必以无法挽回作为学费。
  出处: 原创·安全开发札记
  作者: 编者
- title: 沙箱里的自由·远帆
  内容: |-
    勇敢尝试固然可贵，但真正负责的创造，会先为失败准备边界，不让旁人替自己的好奇承担全部代价。沙箱允许探索，也限制伤害；它告诉我们，自由并不总要以整个世界作为试验场。

    好的边界不会杀死创造，反而使创造走得更远，因为每一次跌倒都不必以无法挽回作为学费；而我们能做的，是在小范围验证想法，在可恢复的环境里犯错；让野心先经过测试，让承诺先经过现实。
  出处: 原创·安全开发札记
  作者: 编者
