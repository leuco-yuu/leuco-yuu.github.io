    愿我们先确认彼此所用的语言，再交换最重要的信息；学会回应，也学会在结束时妥善关闭连接。即使道路漫长，也要记得：文明并非每个人都一样，而是即使不同，也愿意遵守一套让差异能够安全相遇的礼貌。
