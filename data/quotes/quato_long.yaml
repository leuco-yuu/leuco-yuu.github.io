- title: 洞穴之外·晨钟
  内容: |-
    习惯黑暗的人第一次看见阳光，会以为刺痛本身就是错误；真相有时并不温柔，却能让世界恢复真实的轮廓；认知的成长常伴随不适，因为旧有确信正在失去安全的墙壁。

    不要因新证据令人难受就立即拒绝，也不要因自己见过光便轻蔑仍在洞中的人。真正的启蒙既需要走出去的勇气，也需要回身解释的耐心，让更多人能够逐渐适应广阔，而非被光灼伤。
  出处: 据《理想国》“洞穴寓言”思想化写
  作者: 柏拉图
- title: 洞穴之外·远帆
  内容: |-
