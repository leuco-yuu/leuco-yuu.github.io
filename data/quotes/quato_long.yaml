- title: 异常不是终点·晨钟
  内容: |-
    异常出现时，程序并非只能崩溃；它可以捕获、记录、降级，并在保住核心之后寻找恢复的道路；生活中的意外也不必被解释为命运的判决，它更像一条突然偏离预期的执行路径。

    先保护最重要的部分，再诚实面对错误；允许自己暂停，也为下一次重试保留足够的资源。坚韧不是从不报错，而是在错误发生后，仍能用清醒的方式结束混乱，并把经验写进未来。
