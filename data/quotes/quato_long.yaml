- title: 瓦尔登湖畔·晨钟
  内容: |-
    湖水把天空收进宁静的怀里，提醒人们：生活所需也许没有欲望宣称的那样繁多；简朴不是把世界缩小，而是削去多余的喧嚣，使真正重要的事物重新清晰。

    审视每一项占有是否也在占有你，为时间减负，为注意力选择更少却更深的去处。当生活不再被无数需求拖拽，人便能听见自己的脚步，并在有限日子里，活得更像一个清醒的主人。
  出处: 据《瓦尔登湖》思想化写
  作者: 亨利·戴维·梭罗
- title: 瓦尔登湖畔·远帆
  内容: |-
    简朴不是把世界缩小，而是削去多余的喧嚣，使真正重要的事物重新清晰。湖水把天空收进宁静的怀里，提醒人们：生活所需也许没有欲望宣称的那样繁多。

    当生活不再被无数需求拖拽，人便能听见自己的脚步，并在有限日子里，活得更像一个清醒的主人；而我们能做的，是审视每一项占有是否也在占有你，为时间减负，为注意力选择更少却更深的去处。
  出处: 据《瓦尔登湖》思想化写
  作者: 亨利·戴维·梭罗
