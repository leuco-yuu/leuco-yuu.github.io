- title: 防火墙的边界·晨钟
  内容: |-
    边界不是为了拒绝世界，而是让善意有门可入，让恶意无隙可乘；城墙若没有城门，也会困住城里的人；最好的防护既不过度敞开，也不过度封闭，它懂得识别、过滤，并为例外保留审慎的通道。

    在人际之间也应如此：可以温柔，却不必毫无底线；可以宽容，却无需允许伤害反复穿越同一端口。当边界清楚，亲近才不再以牺牲为代价，自由也不再成为毫无防备的另一个名字。
  出处: 原创·边界安全札记
  作者: 编者
- title: 防火墙的边界·远帆
