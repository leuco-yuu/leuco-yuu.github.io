- title: 协议的礼貌·晨钟
  内容: |-
    协议让陌生机器能够交谈，因为双方先约定如何开始、怎样确认、何时结束；人与人的理解也很少只靠善意；没有共同规则，再真诚的表达也可能在不同语境中彼此错过。

    先确认彼此所用的语言，再交换最重要的信息；学会回应，也学会在结束时妥善关闭连接。文明并非每个人都一样，而是即使不同，也愿意遵守一套让差异能够安全相遇的礼貌。
  出处: 原创·通信协议札记
  作者: 编者
