- title: 重构的勇气·晨钟
  内容: |-
    重构不改变程序想完成的目标，却重新安排内部结构，让未来的修改不再付出沉重代价；我们也会在成长中发现，愿望仍然真实，只是旧有的生活方式已经难以承载它。

    不要等到一切崩塌才整理自己；从一个习惯、一段关系、一项承诺开始，减少隐蔽的混乱。改变结构并非背叛初心，恰恰是为了让初心摆脱陈旧的负担，在更清楚的秩序里继续运行。
  出处: 原创·软件工程人生札记
  作者: 编者
