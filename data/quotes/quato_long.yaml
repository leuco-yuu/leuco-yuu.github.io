- title: 路由与方向·晨钟
  内容: |-
    路由表不替数据决定意义，却帮助它在复杂世界中找到下一跳；方向往往也不是终点，而是此刻最合适的一步；迷茫时不必一次看见整条道路，只要知道哪些路径已不可达，哪一个节点仍与希望相连。

    更新自己的地图，接受绕行，别把暂时的拥塞误认为永久的封锁。远方不是由一次完美选择抵达的，而是无数次在岔路口重新计算，然后仍愿意把自己送往值得的地方。
  出处: 原创·网络路由随想
  作者: 编者
- title: 路由与方向·远帆
