    平衡不是永远停在正中，而是像调音一样不断倾听、修正，使生命既有力量，又不因过度用力而失去旋律；而我们能做的，是工作时尽力，也给身体休息；坚持原则，同时看见现实的复杂。
  出处: 据《尼各马可伦理学》思想化写
  作者: 亚里士多德
