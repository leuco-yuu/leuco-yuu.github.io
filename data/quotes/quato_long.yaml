- title: 西西弗斯的清晨·晨钟
  内容: |-
    巨石一次次滚落，清晨却仍会到来；重复并没有自动赋予生活意义，却把选择意义的权利交还给人；命运也许限制道路，却不能完全决定我们以何种姿态行走。

    在不可避免的劳作中寻找自己的节奏，在无常里保存清醒，不把希望只押在终点。当一个人明知山路漫长，仍亲手推起今日的石头，他便不再只是命运的囚徒，也成为意义的创造者。
  出处: 据《西西弗神话》思想化写
  作者: 阿尔贝·加缪
- title: 西西弗斯的清晨·远帆
  内容: |-
    命运也许限制道路，却不能完全决定我们以何种姿态行走。巨石一次次滚落，清晨却仍会到来；重复并没有自动赋予生活意义，却把选择意义的权利交还给人。

    当一个人明知山路漫长，仍亲手推起今日的石头，他便不再只是命运的囚徒，也成为意义的创造者；而我们能做的，是在不可避免的劳作中寻找自己的节奏，在无常里保存清醒，不把希望只押在终点。
  出处: 据《西西弗神话》思想化写
  作者: 阿尔贝·加缪
