- title: 熵与选择·晨钟
  内容: |-
    随机性并非混乱的同义词，它是不可预测的源泉，也是许多安全机制得以成立的微小自由；人生若每一步都被昨日完全决定，便只剩机械重复；正因为未来尚有熵，我们才仍能选择不同的方向。

    不要把偶然当作全部，也不要把计划当作神谕；在可控之处努力，在不可控之处保持弹性。真正的勇气，是知道世界不会给出固定输出，仍愿意用清醒与善意，为下一刻增加更好的可能。
