- title: 月有阴晴·晨钟
  内容: |-
    月亮并不因缺了一角就停止照耀，人生也不会因一段不圆满便失去全部光亮；变化是天地的常情，强求每一刻完整，只会让短暂的阴影遮住仍在的明亮。

    在相聚时认真相聚，在离别时珍惜余温；允许遗憾存在，却不让遗憾垄断记忆。成熟不是把缺憾补成虚假的圆，而是懂得在盈亏往复中，仍能认出那轮始终属于自己的月。
  出处: 据苏轼《水调歌头》意蕴化写
  作者: 苏轼
