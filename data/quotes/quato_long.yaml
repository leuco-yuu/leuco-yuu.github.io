- title: 行胜于言·晨钟
  内容: |-
    道路不会因为我们谈论过无数次便缩短，种子也不会因赞美春天就自动发芽；语言可以点燃方向，却只有行动能把方向交给现实。

    少等待一次完美的心情，多完成一个笨拙的开始；让承诺在日历上有时间，让理想在手上有痕迹。真正的决心往往没有宏大的声音，它只是第二天醒来后，仍继续做昨日说过要做的事。
  出处: 据《论语》与实践哲学思想化写
  作者: 孔子
- title: 行胜于言·远帆
  内容: |-
    语言可以点燃方向，却只有行动能把方向交给现实。道路不会因为我们谈论过无数次便缩短，种子也不会因赞美春天就自动发芽。

    真正的决心往往没有宏大的声音，它只是第二天醒来后，仍继续做昨日说过要做的事；而我们能做的，是少等待一次完美的心情，多完成一个笨拙的开始；让承诺在日历上有时间，让理想在手上有痕迹。
