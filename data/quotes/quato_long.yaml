- title: 反求诸己·星河
  内容: |-
    反省不是把所有责任揽在身上，而是在复杂因果中找到自己仍能改变的部分。回望那些被忽略的细节，便会发现：箭没有射中靶心时，真正的弓手先检查姿势、呼吸与风向，而不是责怪远处的圆环没有迎合自己。

    从今天起，试着少问一句谁该被责备，多问一句下一次可以怎样做得更好。如此，当一个人愿意从自身开始修正，命运便不再只是外界施加的结果，也成为自己可以参与书写的篇章。
  出处: 据《孟子》思想化写
  作者: 孟子
- title: 浩然之气·晨钟
  内容: |-
    真正的勇气并不总是高声，它可能只是面对诱惑时说一声不，面对不义时不肯把眼睛移开；浩然之气来自长久积累的正直，不是临时装出的姿态；每一次诚实，都在心中添一寸辽阔。

    让言语与行动彼此照应，让利益不能轻易改写原则。当内心不再被羞愧与侥幸分割，人便有了站立的根；风再大，也只能吹动衣角，不能带走方向。
  出处: 据《孟子·公孙丑上》意蕴化写
  作者: 孟子
- title: 浩然之气·远帆
  内容: |-
    浩然之气来自长久积累的正直，不是临时装出的姿态；每一次诚实，都在心中添一寸辽阔。真正的勇气并不总是高声，它可能只是面对诱惑时说一声不，面对不义时不肯把眼睛移开。

    当内心不再被羞愧与侥幸分割，人便有了站立的根；风再大，也只能吹动衣角，不能带走方向；而我们能做的，是让言语与行动彼此照应，让利益不能轻易改写原则。
  出处: 据《孟子·公孙丑上》意蕴化写
  作者: 孟子
