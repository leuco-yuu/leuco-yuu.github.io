- title: 百年孤独的雨·晨钟
  内容: |-
    漫长的雨落在小镇，也落在人类反复重演的记忆上；若不理解过去，家族与时代便容易再次走进相同迷宫；遗忘能减轻疼痛，却也可能带走教训；记忆若只剩执念，又会把今日困在昨日。

    诚实保存来路，也允许后人重新解释；不美化伤口，不让伤口成为唯一身份。真正有力量的记忆，不是让我们永远停在雨中，而是帮助后来者认出乌云，并知道何处可以点灯。
  出处: 据《百年孤独》思想化写
  作者: 加夫列尔·加西亚·马尔克斯
- title: 百年孤独的雨·远帆
  内容: |-
