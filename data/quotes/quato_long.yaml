- title: 日新的河·晨钟
  内容: |-
    流水之所以清澈，不只因为源头洁净，也因为它从不把昨日的水紧紧抱住；成长不是突然成为另一个人，而是每天除去一点昏暗，增加一点明白。

    允许旧观点退场，让新的经验进入；今日改正一件小事，也胜过明日想象一场宏大的重生。所谓日新，不是厌弃过去，而是让过去完成使命之后安静流走，使生命始终保持向前的清澈。
  出处: 据《礼记·大学》思想化写
  作者: 曾子
- title: 日新的河·远帆
  内容: |-
