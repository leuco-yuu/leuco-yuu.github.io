  作者: 庄子
- title: 逍遥的尺度·新雪
  内容: |-
    困住人的往往不是能力有限，而是拿别人的天空衡量自己的翅膀；大鹏振翅九万里，蜩与学鸠也有自己的枝头；世界辽阔，并不要求所有生命用同一种高度证明存在。

