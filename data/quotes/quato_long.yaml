    从今天起，试着做事可以精进，做人不必处处算计；允许表达稍显笨拙，只要心意真实、行动可靠。如此，世间最难得的成熟，不是学会所有圆滑，而是在看懂复杂之后，仍保留一份不伤人的质朴。
  出处: 据《道德经》思想化写
  作者: 老子
- title: 星空与准则·晨钟
  内容: |-
    仰望星空时，人会感到自身微小；倾听内心的道德准则时，又会发现微小的生命也能承担庄严；真正的自由不是随意，而是愿意为自己的选择负责，不把他人仅仅当作实现目的的工具。

    在无人强迫时仍尊重规则，在有利可图时仍看见别人的尊严。一个人的伟大，不必以征服世界证明；他只需在辽阔宇宙中，守住那条不愿背叛的内在法则。
  出处: 据《实践理性批判》思想化写
  作者: 伊曼努尔·康德
- title: 星空与准则·远帆
  内容: |-
    真正的自由不是随意，而是愿意为自己的选择负责，不把他人仅仅当作实现目的的工具。仰望星空时，人会感到自身微小；倾听内心的道德准则时，又会发现微小的生命也能承担庄严。

    一个人的伟大，不必以征服世界证明；他只需在辽阔宇宙中，守住那条不愿背叛的内在法则；而我们能做的，是在无人强迫时仍尊重规则，在有利可图时仍看见别人的尊严。
  出处: 据《实践理性批判》思想化写
  作者: 伊曼努尔·康德
