    与其等待世界替我们决定，不如为追问设一个出口，为反省设一个期限，为无法改变的事情写下终止条件；因为真正的理解不是把所有层次都展开，而是在恰当的深度返回，把所得带回此刻，并继续生活。
  出处: 原创·算法人生札记
  作者: 编者
- title: 递归的归途·星河
  内容: |-
    人生的执念也像没有基线的函数，越想解决过去，越可能在相同的问题里消耗新的今天。回望那些被忽略的细节，便会发现：递归一次次走向更深处，却必须记得停止的条件；否则再精巧的调用，也会在无尽重复中耗尽自己。

