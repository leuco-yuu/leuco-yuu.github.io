    因此，不妨在无人强迫时仍尊重规则，在有利可图时仍看见别人的尊严。到最后会明白，一个人的伟大，不必以征服世界证明；他只需在辽阔宇宙中，守住那条不愿背叛的内在法则。
  出处: 据《实践理性批判》思想化写
  作者: 伊曼努尔·康德
