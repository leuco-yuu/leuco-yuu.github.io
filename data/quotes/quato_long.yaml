- title: 密码与沉默·晨钟
  内容: |-
    好的密码不向喧闹证明力量，它只在无人看见的地方守住边界，像夜色替万家灯火收起多余的目光；秘密的价值不在神秘，而在选择何时说、向谁说，以及说到何处便停下。

    为重要的信息加密，也为重要的情绪留出安静；不是所有真相都适合在最冲动的时刻明文传输。懂得沉默的人并非没有故事，只是知道有些珍贵必须经过信任的握手，才能抵达另一个人的心。
  出处: 原创·密码学随想
  作者: 编者
- title: 密码与沉默·远帆
  内容: |-
    秘密的价值不在神秘，而在选择何时说、向谁说，以及说到何处便停下。好的密码不向喧闹证明力量，它只在无人看见的地方守住边界，像夜色替万家灯火收起多余的目光。

    懂得沉默的人并非没有故事，只是知道有些珍贵必须经过信任的握手，才能抵达另一个人的心；而我们能做的，是为重要的信息加密，也为重要的情绪留出安静；不是所有真相都适合在最冲动的时刻明文传输。
  出处: 原创·密码学随想
  作者: 编者
- title: 密码与沉默·灯影
  内容: |-
