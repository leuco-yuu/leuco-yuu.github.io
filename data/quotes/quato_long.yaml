- title: 备份的意义·晨钟
  内容: |-
    备份像在远方种下另一棵树，你平日未必想起它，直到风折断眼前的枝干，才知道希望早已悄悄生根；人不能复制昨天，却可以保存经验；世界不会保证不失去，但允许我们为失去之后留下重新开始的路径。

    把重要文件交给不同介质，把重要关系交给日常珍惜，把重要愿望写进可执行的今天。所谓从容，不是相信一切都不会消失，而是即使失去一部分，仍有种子、地图和归途。
  出处: 原创·数据与人生札记
  作者: 编者
- title: 备份的意义·远帆
  内容: |-
    人不能复制昨天，却可以保存经验；世界不会保证不失去，但允许我们为失去之后留下重新开始的路径。备份像在远方种下另一棵树，你平日未必想起它，直到风折断眼前的枝干，才知道希望早已悄悄生根。

    所谓从容，不是相信一切都不会消失，而是即使失去一部分，仍有种子、地图和归途；而我们能做的，是把重要文件交给不同介质，把重要关系交给日常珍惜，把重要愿望写进可执行的今天。
  出处: 原创·数据与人生札记
  作者: 编者
