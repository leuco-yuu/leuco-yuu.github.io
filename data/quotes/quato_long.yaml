- title: 斯多葛的清晨·晨钟
  内容: |-
    清晨到来时，天气、他人的态度与世界的安排都未必听从我们，但自己的判断仍有一部分可以选择；把精力交给可控之事，是为了不让不可控之事夺走全部生命。

    认真准备，坦然接受结果；改变能改变的，承受暂时不能改变的，并分辨两者。内心的安定不是让世界停止风浪，而是在风浪中握紧自己的舵，不把方向盘交给偶然与愤怒。
  出处: 据《沉思录》思想化写
  作者: 马可·奥勒留
- title: 斯多葛的清晨·远帆
  内容: |-
