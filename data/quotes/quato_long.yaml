- title: 自然的书页·晨钟
  内容: |-
    一片落叶记录季节，一层岩石保存年代；自然从不急着解释，却把答案写进漫长变化；科学的谦逊来自承认：我们看到的只是巨大世界暂时显露的一角。

    提出大胆的问题，也让证据拥有最后的发言权；珍惜惊奇，同时警惕愿望替代事实。真正的求知，不是让宇宙服从我们的想象，而是不断修正自己，直到思想更接近事物原本的模样。
  出处: 据科学方法论思想化写
  作者: 佚名
- title: 自然的书页·远帆
  内容: |-
    科学的谦逊来自承认：我们看到的只是巨大世界暂时显露的一角。一片落叶记录季节，一层岩石保存年代；自然从不急着解释，却把答案写进漫长变化。

    真正的求知，不是让宇宙服从我们的想象，而是不断修正自己，直到思想更接近事物原本的模样；而我们能做的，是提出大胆的问题，也让证据拥有最后的发言权；珍惜惊奇，同时警惕愿望替代事实。
  出处: 据科学方法论思想化写
  作者: 佚名
