- title: 先知的赠予·晨钟
  内容: |-
    给予若只是为了获得赞美，礼物便仍握在自己手中；真正的赠予，是让善意离开占有，抵达他人的需要；我们给出的不只是物品，也包括时间、耐心和不急于评判的倾听。

    帮助之前先询问对方真正需要什么，不让善意成为控制，不让牺牲悄悄积成怨恨。最明亮的给予，不把受助者置于阴影；它像一盏灯，照亮道路之后，仍把行走的尊严留给对方。
  出处: 据《先知》思想化写
  作者: 纪伯伦
- title: 先知的赠予·远帆
  内容: |-
    我们给出的不只是物品，也包括时间、耐心和不急于评判的倾听。给予若只是为了获得赞美，礼物便仍握在自己手中；真正的赠予，是让善意离开占有，抵达他人的需要。

    最明亮的给予，不把受助者置于阴影；它像一盏灯，照亮道路之后，仍把行走的尊严留给对方；而我们能做的，是帮助之前先询问对方真正需要什么，不让善意成为控制，不让牺牲悄悄积成怨恨。
  出处: 据《先知》思想化写
  作者: 纪伯伦
