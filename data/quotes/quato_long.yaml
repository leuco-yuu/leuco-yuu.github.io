- title: 黑夜与歌·晨钟
  内容: |-
    黑夜并不会因为我们害怕就提前结束，但歌声能让同行者知道彼此仍在；希望不是否认痛苦，而是在痛苦中保存一种尚可继续的联系。

    当自己还有余力时，为别人留一盏灯；当自己疲惫时，也允许接受他人的搀扶。没有人必须独自证明坚强，真正的勇敢常是承认天色很暗，却仍愿意与他人一起走向尚未看见的黎明。
  出处: 据世界抒情诗传统意蕴化写
  作者: 佚名
- title: 黑夜与歌·远帆
  内容: |-
    希望不是否认痛苦，而是在痛苦中保存一种尚可继续的联系。黑夜并不会因为我们害怕就提前结束，但歌声能让同行者知道彼此仍在。

    没有人必须独自证明坚强，真正的勇敢常是承认天色很暗，却仍愿意与他人一起走向尚未看见的黎明；而我们能做的，是当自己还有余力时，为别人留一盏灯；当自己疲惫时，也允许接受他人的搀扶。
  出处: 据世界抒情诗传统意蕴化写
  作者: 佚名
