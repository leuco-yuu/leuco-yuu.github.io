- title: 止于至善·晨钟
  内容: |-
    远方的善并非高悬在云端，它藏在一次不敷衍的工作、一句不伤人的回答和一个无人知晓的选择里；追求更好，不等于苛责自己永远完美；它是每次看见不足后，仍愿意靠近一点。

    把宏大理想放进细节，让善意有方法，让责任有完成的时间。至善也许永远在前方，但沿着它行走的人，会在每一步里变得更清明、更可靠。
  出处: 据《礼记·大学》思想化写
  作者: 曾子
- title: 止于至善·远帆
  内容: |-
