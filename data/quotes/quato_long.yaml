- title: 江海余生·晨钟
  内容: |-
    大江向东，从不为一朵浪花停留；人的得失放进漫长岁月，也会从峭壁变成可以回望的水纹；旷达不是没有痛，而是不让痛决定整个世界的颜色。

    在无法挽回处学会放手，在仍可珍惜处认真生活；把心从一次成败中解救出来。当你愿意让生命继续流动，昨日的风雨便不再只是伤痕，也会成为江面上推动远帆的一阵风。
  出处: 据苏轼词文意蕴化写
  作者: 苏轼
- title: 江海余生·远帆
  内容: |-
