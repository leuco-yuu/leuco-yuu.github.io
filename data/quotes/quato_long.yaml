- title: 长风之志·晨钟
  内容: |-
    长风未必总在身后，海浪也不会因为志向坚定就自动平息；远行从来不是一条顺从愿望的直线；真正的壮志，不是不识艰难，而是在识尽艰难之后，仍不肯把灵魂缩成避风的小屋。

    准备船帆，也学习辨认逆风；允许暂时停泊，却不要把港口误认成终身的边界。有些道路之所以值得，并非因为保证成功，而是当你走在其上，已经成为更辽阔、更诚实的自己。
  出处: 据李白诗歌意蕴化写
  作者: 李白
- title: 长风之志·远帆
  内容: |-
    真正的壮志，不是不识艰难，而是在识尽艰难之后，仍不肯把灵魂缩成避风的小屋。长风未必总在身后，海浪也不会因为志向坚定就自动平息；远行从来不是一条顺从愿望的直线。

    有些道路之所以值得，并非因为保证成功，而是当你走在其上，已经成为更辽阔、更诚实的自己；而我们能做的，是准备船帆，也学习辨认逆风；允许暂时停泊，却不要把港口误认成终身的边界。
