- title: 中道的琴弦·晨钟
  内容: |-
    琴弦太松不能成调，太紧又容易断裂；人的生活也需要在放纵与苛刻之间寻找可持续的张力；德性很少藏在极端，它更像在具体情境中反复练习恰当的分寸。

    工作时尽力，也给身体休息；坚持原则，同时看见现实的复杂。平衡不是永远停在正中，而是像调音一样不断倾听、修正，使生命既有力量，又不因过度用力而失去旋律。
  出处: 据《尼各马可伦理学》思想化写
  作者: 亚里士多德
- title: 中道的琴弦·远帆
  内容: |-
