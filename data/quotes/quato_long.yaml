- title: 线程之间·晨钟
  内容: |-
    多个线程共同奔跑时，最危险的并非速度不够，而是谁都以为资源理应先属于自己；许多争执也源于此：我们急着完成自己的任务，却忘了别人同样背负着看不见的时限与阻塞。

    学会等待锁，也学会尽快释放占有；说清需求，减少争抢，为彼此保留能够继续运行的空间。真正高效的同行，不是所有人同时说话，而是在恰当的时刻交出控制权，让共同的进程抵达终点。
