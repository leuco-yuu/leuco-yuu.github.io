- title: 站在巨人的肩上·晨钟
  内容: |-
    后来者看得更远，不是因为天生高大，而是无数前人的知识在脚下搭成了阶梯；成就从来不是孤立的奇迹，它包含老师的指引、同行的质疑和许多无名者留下的工具。

    尊重引用，承认帮助，也把自己的发现整理清楚，交给尚未来到的人。知识最美的传承，是每一代都不必从黑暗重新起步，而能在已有的光上，再点亮一小段未知。
  出处: 据牛顿书信名句思想化写
  作者: 艾萨克·牛顿
- title: 站在巨人的肩上·远帆
  内容: |-
