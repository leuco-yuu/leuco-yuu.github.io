- title: 编译之前·晨钟
  内容: |-
    代码在运行前要经过编译，思想在行动前也需要检查语义、发现冲突，并清理那些看似正确的错别字；冲动常像未经检查的源文件，热烈却可能无法执行；沉思则把愿望翻译成现实能够理解的形式。

    做决定之前，多问一句目标是什么、代价由谁承担、失败能否恢复。真正有效的热情，不只燃烧得明亮，还能通过现实的编译，在生活中稳定运行，而不是停留在漂亮的注释里。
