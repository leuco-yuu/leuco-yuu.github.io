- title: 宇宙的微光·晨钟
  内容: |-
    来自遥远恒星的光穿越漫长黑暗，抵达眼睛时，也许那颗星早已改变了模样；我们所看见的世界总带着时间的延迟，因此判断一个人或一件事时，应为变化保留余地。

    别用旧日的光永久定义今日的人，也别因回应尚未抵达便否认曾经的照耀。理解时间的距离，会让我们更温柔：许多相遇都是古老光芒与此刻目光，在宇宙里难得的一次重逢。
  出处: 据天文学常识诗意化写
  作者: 佚名
- title: 宇宙的微光·远帆
  内容: |-
    我们所看见的世界总带着时间的延迟，因此判断一个人或一件事时，应为变化保留余地。来自遥远恒星的光穿越漫长黑暗，抵达眼睛时，也许那颗星早已改变了模样。

    理解时间的距离，会让我们更温柔：许多相遇都是古老光芒与此刻目光，在宇宙里难得的一次重逢；而我们能做的，是别用旧日的光永久定义今日的人，也别因回应尚未抵达便否认曾经的照耀。
  出处: 据天文学常识诗意化写
  作者: 佚名
