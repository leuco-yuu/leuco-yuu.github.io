- title: 追忆的气味·晨钟
  内容: |-
    一块点心的香气，可能忽然打开多年以前的房间；时间并未完全离去，它只是藏进感官最细小的褶皱；记忆不按日历排列，它常被一束光、一段旋律或一次拥抱重新唤醒。

    珍惜日常中看似微不足道的细节，因为它们或许会成为未来回望此刻的钥匙。人生的深度，不只由重大事件构成，也由无数微小感受编织；它们沉默，却替我们保存曾经真实活过的证据。
  出处: 据《追忆似水年华》思想化写
  作者: 马塞尔·普鲁斯特
- title: 追忆的气味·远帆
  内容: |-
    记忆不按日历排列，它常被一束光、一段旋律或一次拥抱重新唤醒。一块点心的香气，可能忽然打开多年以前的房间；时间并未完全离去，它只是藏进感官最细小的褶皱。

