  作者: 欧内斯特·海明威
- title: 小王子的玫瑰·晨钟
  内容: |-
    星球上也许有无数朵相似的玫瑰，但你为其中一朵浇过水、挡过风，她便在时间里变得不可替代；珍贵并非总由稀缺决定，更多时候，它来自持续投入的注意与责任。

    不要只寻找完美的人，也要学习照料已经建立的关系；让承诺落在平凡日常，而非只停在动人的话里。我们真正拥有的，从来不是被占有的对象，而是那些因认真付出而彼此照亮的时光。
  出处: 据《小王子》思想化写
  作者: 安托万·德·圣-埃克苏佩里
- title: 小王子的玫瑰·远帆
  内容: |-
    珍贵并非总由稀缺决定，更多时候，它来自持续投入的注意与责任。星球上也许有无数朵相似的玫瑰，但你为其中一朵浇过水、挡过风，她便在时间里变得不可替代。

    我们真正拥有的，从来不是被占有的对象，而是那些因认真付出而彼此照亮的时光；而我们能做的，是不要只寻找完美的人，也要学习照料已经建立的关系；让承诺落在平凡日常，而非只停在动人的话里。
  出处: 据《小王子》思想化写
  作者: 安托万·德·圣-埃克苏佩里
