- title: 离线时刻·晨钟
  内容: |-
    设备离线时失去即时回应，却也终于不再被每一声提醒牵走目光，重新听见房间、风声与自己的呼吸；连接世界很重要，但持续在线并不等于真正抵达；过多的信息会让心灵像拥塞的信道，只剩噪声。

    为自己安排无通知的时刻，去读完一页书，走完一段路，认真看一个人的眼睛。偶尔离线不是逃离时代，而是把注意力从无数远方收回，让此刻重新拥有足够清晰的带宽。
  出处: 原创·数字生活札记
  作者: 编者
- title: 离线时刻·远帆
