- title: 竹石之心·晨钟
  内容: |-
    竹子在岩缝中扎根，风吹过时弯下身，却没有因此失去向上的方向；坚韧并非永远僵硬；能够适度弯曲，反而让生命避开无谓的折断。

    在原则上扎根，在方法上留有弹性；不因一时退让否定勇气，也不因一时强硬证明尊严。真正可靠的心，既有岩石般的坚持，也有竹叶般的轻盈，知道何时守住，何时随风。
  出处: 据郑燮《竹石》意蕴化写
  作者: 郑燮
- title: 竹石之心·远帆
