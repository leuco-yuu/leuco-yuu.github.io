- title: 反求诸己·晨钟
  内容: |-
    箭没有射中靶心时，真正的弓手先检查姿势、呼吸与风向，而不是责怪远处的圆环没有迎合自己；反省不是把所有责任揽在身上，而是在复杂因果中找到自己仍能改变的部分。

    少问一句谁该被责备，多问一句下一次可以怎样做得更好。当一个人愿意从自身开始修正，命运便不再只是外界施加的结果，也成为自己可以参与书写的篇章。
  出处: 据《孟子》思想化写
  作者: 孟子
- title: 反求诸己·远帆
  内容: |-
    反省不是把所有责任揽在身上，而是在复杂因果中找到自己仍能改变的部分。箭没有射中靶心时，真正的弓手先检查姿势、呼吸与风向，而不是责怪远处的圆环没有迎合自己。

    当一个人愿意从自身开始修正，命运便不再只是外界施加的结果，也成为自己可以参与书写的篇章；而我们能做的，是少问一句谁该被责备，多问一句下一次可以怎样做得更好。
  出处: 据《孟子》思想化写
  作者: 孟子
