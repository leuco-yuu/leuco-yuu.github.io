- title: 飞鸟与天空·晨钟
  内容: |-
    飞鸟掠过天空，不留下占有的痕迹，却把自由的弧线留在人心里；爱并不总要紧握，有时真正的珍惜，是允许对方按照自己的季节生长。

    靠近时给予温度，分别时保留祝福；不要用恐惧把关系变成笼子。那些真正属于生命的相遇，即使没有永久停留，也会像翅膀划过晨光，让我们从此知道天空可以多么辽阔。
  出处: 据《飞鸟集》意蕴化写
  作者: 拉宾德拉纳特·泰戈尔
- title: 飞鸟与天空·远帆
