- title: 老人与海·晨钟
  内容: |-
    大海可以夺走猎物，却不能替一个人定义失败；有些尊严，正是在结果被风浪带走之后才显现；努力并不保证世界回报同等的礼物，但它会塑造我们面对世界的姿态。

    为目标竭尽所能，也接受自然不受意志支配；失去成果时，仍保留经验、技艺与重新出海的勇气。人或许会被击倒，却不必把灵魂交给失败；只要仍愿意迎向海风，故事就没有在那一次空手而归中结束。
  出处: 据《老人与海》思想化写
  作者: 欧内斯特·海明威
- title: 老人与海·远帆
  内容: |-
    努力并不保证世界回报同等的礼物，但它会塑造我们面对世界的姿态。大海可以夺走猎物，却不能替一个人定义失败；有些尊严，正是在结果被风浪带走之后才显现。

    人或许会被击倒，却不必把灵魂交给失败；只要仍愿意迎向海风，故事就没有在那一次空手而归中结束；而我们能做的，是为目标竭尽所能，也接受自然不受意志支配；失去成果时，仍保留经验、技艺与重新出海的勇气。
  出处: 据《老人与海》思想化写
  作者: 欧内斯特·海明威
