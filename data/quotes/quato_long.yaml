- title: 不迁怒·晨钟
  内容: |-
    情绪像骤雨，来时遮住视线；若把它倾倒给无辜的人，雨停之后，地上留下的却是别人的泥泞；不迁怒不是压抑感受，而是为感受找到真正的来处与合适的出口。

    在开口前停一息，区分谁造成了问题，谁只是恰好站在面前。能够承担自己情绪的人，才真正拥有内心的力量；他不让一时的风暴，成为伤害所爱之人的借口。
  出处: 据《论语·雍也》思想化写
  作者: 孔子
- title: 不迁怒·远帆
  内容: |-
    不迁怒不是压抑感受，而是为感受找到真正的来处与合适的出口。情绪像骤雨，来时遮住视线；若把它倾倒给无辜的人，雨停之后，地上留下的却是别人的泥泞。

    能够承担自己情绪的人，才真正拥有内心的力量；他不让一时的风暴，成为伤害所爱之人的借口；而我们能做的，是在开口前停一息，区分谁造成了问题，谁只是恰好站在面前。
