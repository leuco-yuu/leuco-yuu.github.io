- title: 未满之器·晨钟
  内容: |-
    器皿因为留有空处，才有承载清水与月光的可能；人若把自己装得太满，便再听不进新的风声；谦逊不是缩小自身，而是给未知留下位置，承认天地广大，自己的答案仍可被修正。

    在赞美中保持清醒，在成就后继续学习，也允许别人拥有与你不同的道路。真正丰盛的心，不急于占满每一处空白；它知道空处并非缺陷，而是未来得以进入的门。
  出处: 据《道德经》思想化写
  作者: 老子
- title: 未满之器·远帆
  内容: |-
