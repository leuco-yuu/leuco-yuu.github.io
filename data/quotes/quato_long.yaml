quotes:
- title: 最小权限之外·晨钟
  内容: |-
    一扇门若把所有钥匙交给同一个人，平静只是一场尚未发生的事故；系统如此，人生中的信任也如此；真正可靠的秩序，不靠永远正确的人，而靠即使有人犯错，损失也被边界温柔地拦住。

    给权限设期限，给决定留复核，给重要之物准备第二道守护；克制不是不信任，而是尊重人的有限。成熟的安全感不是天下无事，而是风暴来时，每一道门都知道自己为何关闭、又为谁开启。
  出处: 原创·网络安全札记
  作者: 编者
- title: 最小权限之外·远帆
  内容: |-
    真正可靠的秩序，不靠永远正确的人，而靠即使有人犯错，损失也被边界温柔地拦住。一扇门若把所有钥匙交给同一个人，平静只是一场尚未发生的事故；系统如此，人生中的信任也如此。

    成熟的安全感不是天下无事，而是风暴来时，每一道门都知道自己为何关闭、又为谁开启；而我们能做的，是给权限设期限，给决定留复核，给重要之物准备第二道守护；克制不是不信任，而是尊重人的有限。
  出处: 原创·网络安全札记
  作者: 编者
- title: 最小权限之外·灯影
  内容: |-
    一扇门若把所有钥匙交给同一个人，平静只是一场尚未发生的事故；系统如此，人生中的信任也如此。许多时候，真正可靠的秩序，不靠永远正确的人，而靠即使有人犯错，损失也被边界温柔地拦住。

    因此，不妨给权限设期限，给决定留复核，给重要之物准备第二道守护；克制不是不信任，而是尊重人的有限。到最后会明白，成熟的安全感不是天下无事，而是风暴来时，每一道门都知道自己为何关闭、又为谁开启。
  出处: 原创·网络安全札记
  作者: 编者
- title: 最小权限之外·新雪
  内容: |-
    真正可靠的秩序，不靠永远正确的人，而靠即使有人犯错，损失也被边界温柔地拦住；一扇门若把所有钥匙交给同一个人，平静只是一场尚未发生的事故；系统如此，人生中的信任也如此。

    愿我们给权限设期限，给决定留复核，给重要之物准备第二道守护；克制不是不信任，而是尊重人的有限。即使道路漫长，也要记得：成熟的安全感不是天下无事，而是风暴来时，每一道门都知道自己为何关闭、又为谁开启。
  出处: 原创·网络安全札记
  作者: 编者
- title: 最小权限之外·回廊
  内容: |-
    一扇门若把所有钥匙交给同一个人，平静只是一场尚未发生的事故；系统如此，人生中的信任也如此，这并非偶然。真正可靠的秩序，不靠永远正确的人，而靠即使有人犯错，损失也被边界温柔地拦住。

    与其等待世界替我们决定，不如给权限设期限，给决定留复核，给重要之物准备第二道守护；克制不是不信任，而是尊重人的有限；因为成熟的安全感不是天下无事，而是风暴来时，每一道门都知道自己为何关闭、又为谁开启。
  出处: 原创·网络安全札记
  作者: 编者
- title: 最小权限之外·星河
  内容: |-
    真正可靠的秩序，不靠永远正确的人，而靠即使有人犯错，损失也被边界温柔地拦住。回望那些被忽略的细节，便会发现：一扇门若把所有钥匙交给同一个人，平静只是一场尚未发生的事故；系统如此，人生中的信任也如此。

    从今天起，试着给权限设期限，给决定留复核，给重要之物准备第二道守护；克制不是不信任，而是尊重人的有限。如此，成熟的安全感不是天下无事，而是风暴来时，每一道门都知道自己为何关闭、又为谁开启。
  出处: 原创·网络安全札记
  作者: 编者
- title: 补丁与旧伤·晨钟
  内容: |-
    漏洞常躲在最熟悉的角落，像旧墙里细小的裂缝，晴天看不见，雨季才听见它缓慢扩大的声音；承认系统需要修补，并不等于承认失败；能够更新，正是技术与生命仍有希望的证明。

    不要因一次平稳就拒绝升级，也不要因一次受伤就把心封死；检查、修复、重启，都是继续前行的方式。真正的坚固从来不是从未破损，而是每次裂开之后，都更懂得如何让光进来，而不让风暴闯入。
  出处: 原创·系统维护札记
  作者: 编者
- title: 补丁与旧伤·远帆
  内容: |-
    承认系统需要修补，并不等于承认失败；能够更新，正是技术与生命仍有希望的证明。漏洞常躲在最熟悉的角落，像旧墙里细小的裂缝，晴天看不见，雨季才听见它缓慢扩大的声音。

    真正的坚固从来不是从未破损，而是每次裂开之后，都更懂得如何让光进来，而不让风暴闯入；而我们能做的，是不要因一次平稳就拒绝升级，也不要因一次受伤就把心封死；检查、修复、重启，都是继续前行的方式。
  出处: 原创·系统维护札记
  作者: 编者
- title: 补丁与旧伤·灯影
  内容: |-
    漏洞常躲在最熟悉的角落，像旧墙里细小的裂缝，晴天看不见，雨季才听见它缓慢扩大的声音。许多时候，承认系统需要修补，并不等于承认失败；能够更新，正是技术与生命仍有希望的证明。

