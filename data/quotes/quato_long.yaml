- title: 逍遥的尺度·晨钟
  内容: |-
    大鹏振翅九万里，蜩与学鸠也有自己的枝头；世界辽阔，并不要求所有生命用同一种高度证明存在；困住人的往往不是能力有限，而是拿别人的天空衡量自己的翅膀。

    看清所处的风，也看清内心真正的方向；不因远方而轻蔑近处，不因近处而否认远方。逍遥不是无所依凭，而是不把外界的尺度变成唯一的牢笼，在合适的天地里活出完整。
  出处: 据《庄子·逍遥游》意蕴化写
  作者: 庄子
- title: 逍遥的尺度·远帆
