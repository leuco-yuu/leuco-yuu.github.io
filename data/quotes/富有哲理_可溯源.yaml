  内容: 君子博学而日参省乎己，则知明而行无过矣。
  作者: 荀子
  出处: 《荀子》·劝学
  核验链接: https://ctext.org/xunzi/zh
- title: 学胜终思
  类型: 引文
  内容: 吾尝终日而思矣，不如须臾之所学也。
  作者: 荀子
  出处: 《荀子》·劝学
  核验链接: https://ctext.org/xunzi/zh
- title: 登高见远
  类型: 引文
  内容: 登高而招，臂非加长也，而见者远。
  作者: 荀子
  出处: 《荀子》·劝学
  核验链接: https://ctext.org/xunzi/zh
- title: 善假于物
  类型: 引文
  内容: 君子生非异也，善假于物也。
  作者: 荀子
  出处: 《荀子》·劝学
  核验链接: https://ctext.org/xunzi/zh
- title: 积善成德
  类型: 引文
  内容: 积善成德，而神明自得，圣心备焉。
  作者: 荀子
  出处: 《荀子》·劝学
  核验链接: https://ctext.org/xunzi/zh
- title: 不积跬步
  类型: 引文
  内容: 不积跬步，无以至千里；不积小流，无以成江海。
  作者: 荀子
  出处: 《荀子》·劝学
  核验链接: https://ctext.org/xunzi/zh
- title: 功在不舍
  类型: 引文
  内容: 骐骥一跃，不能十步；驽马十驾，功在不舍。
  作者: 荀子
  出处: 《荀子》·劝学
  核验链接: https://ctext.org/xunzi/zh
- title: 锲而不舍
  类型: 引文
  内容: 锲而舍之，朽木不折；锲而不舍，金石可镂。
  作者: 荀子
  出处: 《荀子》·劝学
  核验链接: https://ctext.org/xunzi/zh
- title: 观察者偏差
  类型: 原创
  内容: 我们以为自己在观察世界，世界也在通过我们的欲望与恐惧改写观察结果。
- title: 有限模型
  类型: 原创
  内容: 任何世界观都是有限模型；成熟不在于模型无误，而在于知道它何时失效。
- title: 自由与约束
  类型: 原创
  内容: 自由并非没有约束，而是能够理解约束、选择约束，并承担选择的后果。
- title: 名字与实物
  类型: 原创
  内容: 名字帮助我们抓住事物，也可能让我们误以为标签已经穷尽了事物本身。
- title: 时间的方向
  类型: 原创
  内容: 时间只向前流动，记忆却不断逆流，因此人总在两个方向上同时生活。
- title: 沉默的含义
  类型: 原创
  内容: 沉默不是空白，它可能容纳拒绝、理解、恐惧，也可能容纳尚未成形的真理。
- title: 尺度问题
  类型: 原创
  内容: 许多争论不是事实冲突，而是双方在不同尺度上测量同一个世界。
- title: 因果之网
  类型: 原创
  内容: 所谓单一原因，常只是我们从复杂因果网络中剪下的一根线。
- title: 选择即排除
  类型: 原创
  内容: 每次选择都同时创造一条道路并关闭若干道路，因此决定总带着看不见的代价。
- title: 身份版本
  类型: 原创
  内容: 自我不是一次写定的常量，而是一段在记忆、关系与行动中持续更新的代码。
- title: 确定性欲望
  类型: 原创
  内容: 人追求确定性，往往不是因为世界可以确定，而是因为心难以承受开放的可能。
- title: 意义生成
  类型: 原创
  内容: 意义未必埋藏在事物内部等待发掘，它也可能在人的投入与承担中被生成。
- title: 真理的距离
  类型: 原创
  内容: 离真理越近，语言有时越谨慎；只有误解才常以绝对口吻快速完成。
- title: 边界中的形状
  类型: 原创
  内容: 事物之所以显出形状，是因为它有边界；人格之所以成立，也因为有所不为。
- title: 记忆重构
  类型: 原创
  内容: 记忆不是过去的只读备份，而是每次调用时都会被现在重新编译的故事。
- title: 共同现实
  类型: 原创
  内容: 共同现实并非人人看见同样景象，而是愿意用可验证的规则处理彼此差异。
- title: 无知的轮廓
  类型: 原创
  内容: 知识增长时，无知并不会简单缩小；它的边界反而会变得更长、更清楚。
- title: 存在的延迟
  类型: 原创
  内容: 许多事物的价值要在失去之后才被感知，仿佛意义总带着迟到的延迟。
- title: 秩序与噪声
  类型: 原创
  内容: 秩序使世界可理解，噪声使世界不僵死；智慧是在两者之间维持可生长的张力。
- title: 目的之问
  类型: 原创
  内容: 当手段越来越高效，最应反复追问的不是还能多快，而是究竟要去哪里。
- title: 自洽陷阱
  类型: 原创
  内容: 一个体系可以内部自洽却与现实脱节，因此逻辑正确仍需接受经验的审问。
- title: 语言边界
  类型: 原创
  内容: 语言为思想提供边界，却也在边界之外留下无法被直接传输的经验。
- title: 他者之镜
  类型: 原创
  内容: 他人既是限制，也是镜子；没有他者，自我很难知道自己的轮廓。
- title: 偶然与必然
  类型: 原创
  内容: 我们常把已经发生的偶然写成必然，只因故事比混沌更容易被心接受。
- title: 拥有与被拥有
  类型: 原创
  内容: 人拥有工具，工具也会重塑人的习惯；长期使用之后，主人与器物的界线并不总清楚。
- title: 问题先于答案
  类型: 原创
  内容: 答案结束一次搜索，问题却重新划定可思考的世界，因此好问题常比快答案更长寿。
- title: 道德不可外包
  类型: 原创
  内容: 规则可以辅助判断，却不能替人承担后果；道德责任无法完全外包给制度或机器。
- title: 空与用
  类型: 原创
  内容: 容器的价值既在材料，也在其中的空；人生的可能同样依赖未被占满的部分。
- title: 连续的自我
  类型: 原创
  内容: 今日之我与昨日之我并非完全相同，却因记忆和承诺而维持一条连续的线。
- title: 比较的幻觉
  类型: 原创
  内容: 比较把不同生命压到同一坐标轴上，却常删掉最重要的背景变量。
- title: 知识与力量
  类型: 原创
  内容: 知识扩大行动半径，也扩大伤害半径，因此理解越深，责任越不应稀薄。
- title: 不可逆性
  类型: 原创
  内容: 许多决定真正沉重的地方，不在于结果好坏，而在于它改变了以后还能选择什么。
- title: 观看与参与
  类型: 原创
  内容: 旁观者追求完整解释，参与者必须在信息不完整时行动；两种位置拥有不同真理。
- title: 复杂的善
  类型: 原创
  内容: 现实中的善很少像公式那样纯净，它常要在多个不完美结果之间承担选择。
- title: 死亡的刻度
  类型: 原创
  内容: 死亡不是生命之外的反例，而是使每个选择获得重量与刻度的边界条件。
- title: 怀疑的限度
  类型: 原创
  内容: 怀疑能清除虚假，却不能独自建造生活；最终仍须在有限证据上作出承诺。
- title: 技术中立之问
  类型: 原创
  内容: 技术也许没有欲望，但它的结构会奖励某些行为、压低另一些行为，因此从不完全无方向。
- title: 真诚与精确
  类型: 原创
  内容: 真诚保证没有故意欺骗，精确保证没有无意误导；求真需要两者同时在线。
- title: 现在的厚度
  类型: 原创
  内容: 现在并非无限薄的瞬间，它携带过去的惯性，也孕育未来的分岔。
- title: 答案之后
  类型: 原创
  内容: 哲思的价值不只在得到答案，更在答案出现之后仍保留继续追问的能力。
