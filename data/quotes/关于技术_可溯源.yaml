quotes:
- title: 点的定义
  类型: 引文
  内容: 点是没有部分的东西。
  原文: A point is that which has no part.
  作者: Euclid（欧几里得）
  出处: Elements, Book I, Definition 1
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 线的定义
  类型: 引文
  内容: 线是没有宽度的长度。
  原文: A line is breadthless length.
  作者: Euclid（欧几里得）
  出处: Elements, Book I, Definition 2
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 线端为点
  类型: 引文
  内容: 线的两端是点。
  原文: The ends of a line are points.
  作者: Euclid（欧几里得）
  出处: Elements, Book I, Definition 3
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 直线之义
  类型: 引文
  内容: 直线，是与其上的点均匀地排列着的线。
  原文: A straight line is a line which lies evenly with the points on itself.
  作者: Euclid（欧几里得）
  出处: Elements, Book I, Definition 4
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 面的定义
  类型: 引文
  内容: 面是只有长度和宽度的东西。
  原文: A surface is that which has length and breadth only.
  作者: Euclid（欧几里得）
  出处: Elements, Book I, Definition 5
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 面端为线
  类型: 引文
  内容: 面的边界是线。
  原文: The edges of a surface are lines.
  作者: Euclid（欧几里得）
  出处: Elements, Book I, Definition 6
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 平面的定义
  类型: 引文
  内容: 平面，是与其上的直线均匀地排列着的面。
  原文: A plane surface is a surface which lies evenly with the straight lines on itself.
  作者: Euclid（欧几里得）
  出处: Elements, Book I, Definition 7
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 圆的定义
  类型: 引文
  内容: 圆是由一条线围成的平面图形，圆周上的所有直线到其中一点都相等。
  原文: A circle is a plane figure contained by one line such that all the straight lines falling upon it from one point among those lying within the figure equal one another.
  作者: Euclid（欧几里得）
  出处: Elements, Book I, Definition 15
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 同一量的相等
  类型: 引文
  内容: 等于同一量的各量彼此相等。
  原文: Things which equal the same thing also equal one another.
  作者: Euclid（欧几里得）
  出处: Elements, Common Notion 1
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 等量相加
  类型: 引文
  内容: 等量加等量，其和相等。
  原文: If equals are added to equals, then the wholes are equal.
  作者: Euclid（欧几里得）
  出处: Elements, Common Notion 2
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 等量相减
  类型: 引文
  内容: 等量减等量，其差相等。
  原文: If equals are subtracted from equals, then the remainders are equal.
  作者: Euclid（欧几里得）
  出处: Elements, Common Notion 3
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 重合即相等
  类型: 引文
  内容: 彼此重合的东西彼此相等。
  原文: Things which coincide with one another equal one another.
  作者: Euclid（欧几里得）
  出处: Elements, Common Notion 4
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 整体大于部分
  类型: 引文
  内容: 整体大于部分。
  原文: The whole is greater than the part.
  作者: Euclid（欧几里得）
  出处: Elements, Common Notion 5
  核验链接: https://mathcs.clarku.edu/~djoyce/java/elements/bookI/defsI.html
  翻译说明: 中文为本文件据原文自译。
- title: 惯性定律
  类型: 引文
  内容: 每个物体都保持其静止状态或匀速直线运动状态，除非有外力迫使它改变。
  原文: Every body perseveres in its state of rest, or of uniform motion in a right line, unless it is compelled to change that state by forces impressed thereon.
  作者: Isaac Newton（艾萨克·牛顿）
  出处: Principia, Axioms or Laws of Motion, Law I
  核验链接: https://en.wikisource.org/wiki/The_Mathematical_Principles_of_Natural_Philosophy_(1846)
  翻译说明: 中文为本文件据原文自译。
- title: 运动变化
  类型: 引文
  内容: 运动的改变与所施加的动力成正比，并沿着力所作用的直线方向发生。
  原文: The alteration of motion is ever proportional to the motive force impressed; and is made in the direction of the right line in which that force is impressed.
  作者: Isaac Newton（艾萨克·牛顿）
  出处: Principia, Axioms or Laws of Motion, Law II
  核验链接: https://en.wikisource.org/wiki/The_Mathematical_Principles_of_Natural_Philosophy_(1846)
  翻译说明: 中文为本文件据原文自译。
- title: 作用与反作用
  类型: 引文
  内容: 对于每一个作用，总有一个大小相等、方向相反的反作用。
  原文: To every action there is always opposed an equal reaction.
  作者: Isaac Newton（艾萨克·牛顿）
  出处: Principia, Axioms or Laws of Motion, Law III
  核验链接: https://en.wikisource.org/wiki/The_Mathematical_Principles_of_Natural_Philosophy_(1846)
  翻译说明: 中文为本文件据原文自译。
- title: 绝对时间
  类型: 引文
  内容: 绝对的、真实的、数学的时间，由其自身及其本性均匀流逝，与任何外物无关。
  原文: Absolute, true, and mathematical time, of itself, and from its own nature, flows equably without relation to anything external.
  作者: Isaac Newton（艾萨克·牛顿）
  出处: Principia, Scholium on Space and Time
  核验链接: https://en.wikisource.org/wiki/The_Mathematical_Principles_of_Natural_Philosophy_(1846)
  翻译说明: 中文为本文件据原文自译。
- title: 绝对空间
  类型: 引文
  内容: 绝对空间依其本性而存在，与任何外物无关，始终保持相似且不动。
  原文: Absolute space, in its own nature, without relation to anything external, remains always similar and immovable.
  作者: Isaac Newton（艾萨克·牛顿）
  出处: Principia, Scholium on Space and Time
  核验链接: https://en.wikisource.org/wiki/The_Mathematical_Principles_of_Natural_Philosophy_(1846)
  翻译说明: 中文为本文件据原文自译。
- title: 不虚构假说
  类型: 引文
  内容: 我不虚构假说。
