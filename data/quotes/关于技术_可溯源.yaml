  原文: A chronological record of system activities, including records of system accesses and operations performed in a given period.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：audit_log
  核验链接: https://csrc.nist.gov/glossary/term/audit_log
  翻译说明: 中文为本文件据原文自译。
- title: 隐私
  类型: 引文
  内容: 隐私，是确保有关某一实体的信息之机密性与访问受到保护。
  原文: Assurance that the confidentiality of, and access to, certain information about an entity is protected.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-130：privacy
  核验链接: https://csrc.nist.gov/glossary/term/privacy
  翻译说明: 中文为本文件据原文自译。
- title: 人工智能
  类型: 引文
  内容: 人工智能，是一种机器系统能力：针对给定的人类定义目标作出预测、建议或决定，从而影响真实或虚拟环境。
  原文: A machine-based system that can, for a given set of human-defined objectives, make predictions, recommendations, or decisions influencing real or virtual environments.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST AI RMF 1.0：artificial_intelligence
  核验链接: https://csrc.nist.gov/glossary/term/artificial_intelligence
  翻译说明: 中文为本文件据原文自译。
- title: 机器学习
  类型: 引文
  内容: 机器学习，是开发并使用能够适应数据、从数据中学习，以提高任务准确性的计算机系统。
  原文: The development and use of computer systems that adapt and learn from data with the goal of improving accuracy.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST AI 100-1 / NIST AI RMF：machine_learning
  核验链接: https://csrc.nist.gov/glossary/term/machine_learning
  翻译说明: 中文为本文件据原文自译。
