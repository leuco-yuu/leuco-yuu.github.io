  内容: 机密性，是保持对信息访问与披露的授权限制，其中包括保护个人隐私和专有信息的方法。
  原文: Preserving authorized restrictions on information access and disclosure, including means for protecting personal privacy and proprietary information.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；FIPS 200：confidentiality
  核验链接: https://csrc.nist.gov/glossary/term/confidentiality
  翻译说明: 中文为本文件据原文自译。
- title: 完整性
  类型: 引文
  内容: 完整性，是防止信息被不当修改或破坏，并包括确保信息的不可否认性和真实性。
  原文: Guarding against improper information modification or destruction, and includes ensuring information non-repudiation and authenticity.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；FIPS 200：integrity
  核验链接: https://csrc.nist.gov/glossary/term/integrity
  翻译说明: 中文为本文件据原文自译。
- title: 可用性
  类型: 引文
  内容: 可用性，是确保能够及时、可靠地访问和使用信息。
  原文: Ensuring timely and reliable access to and use of information.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；FIPS 200：availability
  核验链接: https://csrc.nist.gov/glossary/term/availability
  翻译说明: 中文为本文件据原文自译。
- title: 信息安全
  类型: 引文
  内容: 信息安全，是保护信息和信息系统免受未经授权的访问、使用、披露、中断、修改或破坏，以提供机密性、完整性与可用性。
  原文: The protection of information and information systems from unauthorized access, use, disclosure, disruption, modification, or destruction in order to provide confidentiality, integrity, and availability.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；FIPS 199/FIPS 200：information_security
  核验链接: https://csrc.nist.gov/glossary/term/information_security
  翻译说明: 中文为本文件据原文自译。
- title: 网络安全
  类型: 引文
  内容: 网络安全，是防止计算机与电子通信系统受到损害，保护并在需要时恢复这些系统及其信息，以确保可用性、完整性、认证、机密性和不可否认性。
  原文: The prevention of damage to, protection of, and restoration of computers, electronic communications systems, electronic communications services, wire communication, and electronic communication, including information contained therein, to ensure its availability, integrity, authentication, confidentiality, and non-repudiation.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-50r1：cybersecurity
  核验链接: https://csrc.nist.gov/glossary/term/cybersecurity
  翻译说明: 中文为本文件据原文自译。
- title: 密码学
  类型: 引文
  内容: 密码学是一门体现原则、手段与方法的学科，用于提供包括机密性、数据完整性、源认证和不可否认性在内的信息安全。
  原文: The discipline that embodies the principles, means, and methods for providing information security, including confidentiality, data integrity, source authentication, and non-repudiation.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-175B Rev. 1：cryptography
  核验链接: https://csrc.nist.gov/glossary/term/cryptography
  翻译说明: 中文为本文件据原文自译。
- title: 认证
  类型: 引文
  内容: 认证，是验证用户、进程或设备的身份，通常是允许其访问系统资源之前的先决条件。
  原文: Verifying the identity of a user, process, or device, often as a prerequisite to allowing access to resources in an information system.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；FIPS 200：authentication
  核验链接: https://csrc.nist.gov/glossary/term/authentication
  翻译说明: 中文为本文件据原文自译。
- title: 授权
  类型: 引文
  内容: 授权，是授予系统实体访问系统资源的权利或许可。
  原文: The right or a permission that is granted to a system entity to access a system resource.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-82r3：authorization
  核验链接: https://csrc.nist.gov/glossary/term/authorization
  翻译说明: 中文为本文件据原文自译。
- title: 访问控制
  类型: 引文
  内容: 访问控制，是准许或拒绝主体访问系统对象——如网络、数据、应用与服务——的决定。
  原文: The decision to permit or deny a subject access to system objects (network, data, application, service, etc.).
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-162：access_control
  核验链接: https://csrc.nist.gov/glossary/term/access_control
  翻译说明: 中文为本文件据原文自译。
- title: 最小权限
  类型: 引文
  内容: 最小权限原则要求，每个实体只获得执行其任务所必需的最低限度系统资源与授权。
  原文: The principle that a security architecture should be designed so that each entity is granted the minimum system resources and authorizations that the entity needs to perform its function.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-160 Vol. 1 Rev. 1：least_privilege
  核验链接: https://csrc.nist.gov/glossary/term/least_privilege
  翻译说明: 中文为本文件据原文自译。
- title: 威胁
  类型: 引文
  内容: 威胁，是任何可能通过未经授权的访问、破坏、披露、修改信息或拒绝服务而对信息系统造成不利影响的情形或事件。
  原文: Any circumstance or event with the potential to adversely impact an information system through unauthorized access, destruction, disclosure, modification of data, and/or denial of service.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-30 Rev. 1：threat
  核验链接: https://csrc.nist.gov/glossary/term/threat
  翻译说明: 中文为本文件据原文自译。
- title: 脆弱性
  类型: 引文
  内容: 脆弱性，是信息系统、系统安全程序、内部控制或实现中的弱点，可能被威胁源利用。
  原文: A weakness in an information system, system security procedures, internal controls, or implementation that could be exploited by a threat source.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-30 Rev. 1：vulnerability
  核验链接: https://csrc.nist.gov/glossary/term/vulnerability
  翻译说明: 中文为本文件据原文自译。
- title: 风险
  类型: 引文
  内容: 风险，是某一实体受到潜在情形或事件威胁的程度，通常由事件发生时的不利影响与发生可能性共同决定。
  原文: A measure of the extent to which an entity is threatened by a potential circumstance or event, and typically a function of the adverse impacts that would arise if the circumstance or event occurs and the likelihood of occurrence.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-30 Rev. 1：risk
  核验链接: https://csrc.nist.gov/glossary/term/risk
  翻译说明: 中文为本文件据原文自译。
- title: 攻击
  类型: 引文
  内容: 攻击，是任何试图收集、破坏、拒绝、削弱或毁坏信息系统资源或信息本身的恶意活动。
  原文: Any kind of malicious activity that attempts to collect, disrupt, deny, degrade, or destroy information system resources or the information itself.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；CNSSI 4009-2015：attack
  核验链接: https://csrc.nist.gov/glossary/term/attack
  翻译说明: 中文为本文件据原文自译。
- title: 攻击面
  类型: 引文
  内容: 攻击面，是系统中攻击者能够尝试进入、影响数据或从中提取数据的边界点集合。
  原文: The set of points on the boundary of a system, a system element, or an environment where an attacker can try to enter, cause an effect on, or extract data from, that system, system element, or environment.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-160 Vol. 2 Rev. 1：attack_surface
  核验链接: https://csrc.nist.gov/glossary/term/attack_surface
  翻译说明: 中文为本文件据原文自译。
- title: 威胁建模
  类型: 引文
  内容: 威胁建模是一种风险评估形式，用于模拟系统攻击与防御的各个方面。
  原文: A form of risk assessment that models aspects of the attack and defense sides of a system.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NISTIR 8286A：threat_modeling
  核验链接: https://csrc.nist.gov/glossary/term/threat_modeling
  翻译说明: 中文为本文件据原文自译。
- title: 安全控制
  类型: 引文
  内容: 安全控制，是为满足一组规定安全要求而对系统或组织实施的保障措施或对策。
  原文: A safeguard or countermeasure prescribed for an information system or an organization designed to protect the confidentiality, integrity, and availability of its information and to meet a set of defined security requirements.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-53 Rev. 5：security_control
  核验链接: https://csrc.nist.gov/glossary/term/security_control
  翻译说明: 中文为本文件据原文自译。
- title: 事件
  类型: 引文
  内容: 安全事件，是实际或迫近地危害信息或信息系统机密性、完整性或可用性的事件。
  原文: An occurrence that actually or imminently jeopardizes, without lawful authority, the integrity, confidentiality, or availability of information or an information system.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；44 U.S.C. §3552：incident
  核验链接: https://csrc.nist.gov/glossary/term/incident
  翻译说明: 中文为本文件据原文自译。
- title: 恶意软件
  类型: 引文
  内容: 恶意软件，是未经授权而执行进程、对系统机密性、完整性或可用性造成不利影响的软件或固件。
  原文: Software or firmware intended to perform an unauthorized process that will have adverse impact on the confidentiality, integrity, or availability of an information system.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-83 Rev. 1：malware
  核验链接: https://csrc.nist.gov/glossary/term/malware
  翻译说明: 中文为本文件据原文自译。
- title: 防火墙
  类型: 引文
  内容: 防火墙，是限制不同安全域之间网络流量流动的设备或程序。
  原文: A device or program that controls the flow of network traffic between networks or hosts that employ differing security postures.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-41 Rev. 1：firewall
  核验链接: https://csrc.nist.gov/glossary/term/firewall
  翻译说明: 中文为本文件据原文自译。
- title: 加密
  类型: 引文
  内容: 加密，是利用密码算法把明文转换为密文的过程。
  原文: The process of changing plaintext into ciphertext using a cryptographic algorithm and key.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：encryption
  核验链接: https://csrc.nist.gov/glossary/term/encryption
  翻译说明: 中文为本文件据原文自译。
- title: 解密
  类型: 引文
  内容: 解密，是把密文转换为明文的过程。
  原文: The process of transforming ciphertext into plaintext.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：decryption
  核验链接: https://csrc.nist.gov/glossary/term/decryption
  翻译说明: 中文为本文件据原文自译。
- title: 明文
  类型: 引文
  内容: 明文，是尚未经过加密、可被直接理解的数据。
  原文: Intelligible data that has meaning and can be understood without the application of decryption.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：plaintext
  核验链接: https://csrc.nist.gov/glossary/term/plaintext
  翻译说明: 中文为本文件据原文自译。
- title: 密文
  类型: 引文
  内容: 密文，是经过加密变换、其语义内容被隐藏的数据。
  原文: Data in its encrypted form.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：ciphertext
  核验链接: https://csrc.nist.gov/glossary/term/ciphertext
  翻译说明: 中文为本文件据原文自译。
- title: 密码算法
  类型: 引文
  内容: 密码算法，是为实现密码功能而明确规定的一组数学规则。
  原文: A well-defined computational procedure that takes variable inputs, including a cryptographic key, and produces an output.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：cryptographic_algorithm
  核验链接: https://csrc.nist.gov/glossary/term/cryptographic_algorithm
  翻译说明: 中文为本文件据原文自译。
- title: 密钥
  类型: 引文
  内容: 密钥，是控制密码变换操作的参数。
  原文: A parameter used in conjunction with a cryptographic algorithm that determines its operation.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：key
  核验链接: https://csrc.nist.gov/glossary/term/key
  翻译说明: 中文为本文件据原文自译。
- title: 公钥密码
  类型: 引文
  内容: 公钥密码使用一对相关密钥：公钥可以公开，私钥由其拥有者秘密保管。
  原文: Cryptography that uses two separate keys to exchange data — one to encrypt or digitally sign the data and one to decrypt the data or verify the digital signature.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：public_key_cryptography
  核验链接: https://csrc.nist.gov/glossary/term/public_key_cryptography
  翻译说明: 中文为本文件据原文自译。
- title: 数字签名
  类型: 引文
  内容: 数字签名，是对数据进行密码变换所得的结果；当正确实现时，它可提供源认证、数据完整性和签名者不可否认性。
  原文: The result of a cryptographic transformation of data that, when properly implemented, provides origin authentication, data integrity, and signatory non-repudiation.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；FIPS 186-5：digital_signature
  核验链接: https://csrc.nist.gov/glossary/term/digital_signature
  翻译说明: 中文为本文件据原文自译。
- title: 散列函数
  类型: 引文
  内容: 散列函数把任意长度的输入映射为固定长度的输出，并被设计为难以从输出反推输入或找到碰撞。
  原文: A function that maps a bit string of arbitrary length to a fixed-length bit string and is expected to have collision resistance and preimage resistance.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；FIPS 180-4：hash_function
  核验链接: https://csrc.nist.gov/glossary/term/hash_function
  翻译说明: 中文为本文件据原文自译。
- title: 消息认证码
  类型: 引文
  内容: 消息认证码是用对称密钥生成的密码校验值，用来检测数据的有意或无意修改。
  原文: A cryptographic checksum on data that uses a symmetric key to detect both accidental and intentional modifications of the data.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：message_authentication_code
  核验链接: https://csrc.nist.gov/glossary/term/message_authentication_code
  翻译说明: 中文为本文件据原文自译。
- title: 不可否认性
  类型: 引文
  内容: 不可否认性，是防止个人或实体否认已经执行过某一特定行为的保证。
  原文: Assurance that the sender of information is provided with proof of delivery and the recipient is provided with proof of the sender’s identity, so neither can later deny having processed the information.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：non_repudiation
  核验链接: https://csrc.nist.gov/glossary/term/non_repudiation
  翻译说明: 中文为本文件据原文自译。
- title: 熵
  类型: 引文
  内容: 熵，是系统中不确定性或随机性的度量。
  原文: A measure of the amount of uncertainty that an attacker faces to determine the value of a secret.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：entropy
  核验链接: https://csrc.nist.gov/glossary/term/entropy
  翻译说明: 中文为本文件据原文自译。
- title: 随机比特生成器
  类型: 引文
  内容: 随机比特生成器，是产生在统计意义上彼此独立且均匀分布的二进制序列的设备或算法。
  原文: A device or algorithm that outputs a sequence of binary bits that appears to be statistically independent and unbiased.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：random_bit_generator
  核验链接: https://csrc.nist.gov/glossary/term/random_bit_generator
  翻译说明: 中文为本文件据原文自译。
- title: 多因素认证
  类型: 引文
  内容: 多因素认证使用来自不同类别的两个或更多认证因素来核验身份。
  原文: An authentication system that requires more than one distinct authentication factor for successful authentication.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-63-4：multi_factor_authentication
  核验链接: https://csrc.nist.gov/glossary/term/multi_factor_authentication
  翻译说明: 中文为本文件据原文自译。
- title: 生物特征
  类型: 引文
  内容: 生物特征，是可自动测量并用于识别个人的生理或行为特征。
  原文: A measurable physical characteristic or personal behavioral trait used to recognize the identity, or verify the claimed identity, of an applicant.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-63A：biometric
  核验链接: https://csrc.nist.gov/glossary/term/biometric
  翻译说明: 中文为本文件据原文自译。
- title: 零信任
  类型: 引文
  内容: 零信任是一组不断演进的网络安全范式，把防御从静态网络边界转向用户、资产与资源本身。
  原文: An evolving set of cybersecurity paradigms that move defenses from static, network-based perimeters to focus on users, assets, and resources.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-207：zero_trust
  核验链接: https://csrc.nist.gov/glossary/term/zero_trust
  翻译说明: 中文为本文件据原文自译。
- title: 零信任架构
  类型: 引文
  内容: 零信任架构，是采用零信任概念并涵盖组件关系、工作流规划与访问策略的企业网络安全方案。
  原文: An enterprise’s cybersecurity plan that utilizes zero trust concepts and encompasses component relationships, workflow planning, and access policies.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-207：zero_trust_architecture
  核验链接: https://csrc.nist.gov/glossary/term/zero_trust_architecture
  翻译说明: 中文为本文件据原文自译。
- title: 韧性
  类型: 引文
  内容: 韧性，是在不利条件、压力、攻击或损害下仍能预见、承受、恢复并适应的能力。
  原文: The ability to prepare for and adapt to changing conditions and withstand and recover rapidly from disruptions.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary：resilience
  核验链接: https://csrc.nist.gov/glossary/term/resilience
  翻译说明: 中文为本文件据原文自译。
- title: 备份
  类型: 引文
  内容: 备份，是为在原始数据丢失或损坏时恢复而保存的数据副本。
  原文: A copy of files and programs made to facilitate recovery if necessary.
  作者: 美国国家标准与技术研究院（NIST）
  出处: NIST CSRC Glossary；NIST SP 800-34 Rev. 1：backup
  核验链接: https://csrc.nist.gov/glossary/term/backup
  翻译说明: 中文为本文件据原文自译。
- title: 审计日志
  类型: 引文
