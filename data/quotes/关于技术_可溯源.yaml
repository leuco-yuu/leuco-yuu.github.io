  核验链接: https://www.gutenberg.org/ebooks/search/?query=Descartes+Discourse+on+Method
  翻译说明: 中文为本文件据原文自译。
- title: 善用心智
  类型: 引文
  内容: 拥有好的心智还不够，关键在于把它用好。
  原文: It is not enough to have a good mind; the main thing is to use it well.
  作者: René Descartes（勒内·笛卡尔）
  出处: Discourse on Method, Part I
  核验链接: https://www.gutenberg.org/ebooks/search/?query=Descartes+Discourse+on+Method
  翻译说明: 中文为本文件据原文自译。
- title: 慢行亦可远
  类型: 引文
  内容: 走得很慢的人若始终走在正路上，也能比奔跑却离开正路的人前进得更远。
  原文: Those who travel very slowly may yet make far greater progress, provided they keep always to the straight road, than those who, while they run, forsake it.
  作者: René Descartes（勒内·笛卡尔）
  出处: Discourse on Method, Part I
  核验链接: https://www.gutenberg.org/ebooks/search/?query=Descartes+Discourse+on+Method
  翻译说明: 中文为本文件据原文自译。
