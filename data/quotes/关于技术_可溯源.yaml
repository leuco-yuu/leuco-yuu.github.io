  翻译说明: 中文为本文件据原文自译。
- title: 理性的平均分配
  类型: 引文
  内容: 在世人之间，健全理性似乎是分配得最平均的事物。
  原文: Good sense is, of all things among men, the most equally distributed.
  作者: René Descartes（勒内·笛卡尔）
