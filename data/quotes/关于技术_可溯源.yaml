  原文: The reading of all good books is like a conversation with the finest minds of past centuries.
  作者: René Descartes（勒内·笛卡尔）
  出处: Discourse on Method, Part I
  核验链接: https://www.gutenberg.org/ebooks/search/?query=Descartes+Discourse+on+Method
  翻译说明: 中文为本文件据原文自译。
- title: 明证规则
  类型: 引文
  内容: 第一条规则，是绝不把任何尚未清楚认识为真的东西当作真理。
  原文: The first was never to accept anything for true which I did not clearly know to be such.
  作者: René Descartes（勒内·笛卡尔）
  出处: Discourse on Method, Part II
  核验链接: https://www.gutenberg.org/ebooks/search/?query=Descartes+Discourse+on+Method
  翻译说明: 中文为本文件据原文自译。
- title: 分而治之
  类型: 引文
  内容: 把所考察的每个困难尽可能分成许多部分，以便更好地解决它。
  原文: To divide each of the difficulties under examination into as many parts as possible, and as might be necessary for its adequate solution.
  作者: René Descartes（勒内·笛卡尔）
  出处: Discourse on Method, Part II
  核验链接: https://www.gutenberg.org/ebooks/search/?query=Descartes+Discourse+on+Method
  翻译说明: 中文为本文件据原文自译。
- title: 由简入繁
  类型: 引文
  内容: 依次引导思想，从最简单、最容易认识的对象开始，逐步上升到更复杂的知识。
  原文: To conduct my thoughts in such order that, by commencing with objects the simplest and easiest to know, I might ascend little by little to the knowledge of the more complex.
  作者: René Descartes（勒内·笛卡尔）
  出处: Discourse on Method, Part II
  核验链接: https://www.gutenberg.org/ebooks/search/?query=Descartes+Discourse+on+Method
  翻译说明: 中文为本文件据原文自译。
- title: 完整枚举
  类型: 引文
  内容: 在每件事上作如此完整的枚举和如此全面的复查，以确信没有遗漏。
  原文: In every case to make enumerations so complete, and reviews so general, that I might be assured that nothing was omitted.
  作者: René Descartes（勒内·笛卡尔）
  出处: Discourse on Method, Part II
  核验链接: https://www.gutenberg.org/ebooks/search/?query=Descartes+Discourse+on+Method
  翻译说明: 中文为本文件据原文自译。
- title: 征服自己
