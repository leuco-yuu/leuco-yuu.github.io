- title: 从确定到怀疑
  类型: 引文
  内容: 若从确定出发，终将止于怀疑；若从怀疑出发并耐心求证，终将抵达确定。
  原文: If a man will begin with certainties, he shall end in doubts; but if he will be content to begin with doubts, he shall end in certainties.
