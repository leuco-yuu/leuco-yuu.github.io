  出处: 《题张司业诗》
  核验链接: https://zh.wikisource.org/w/index.php?title=Special%3ASearch&search=%E7%8E%8B%E5%AE%89%E7%9F%B3+%E9%A2%98%E5%BC%A0%E5%8F%B8%E4%B8%9A%E8%AF%97
