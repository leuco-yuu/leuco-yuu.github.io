- title: 千磨万击
  类型: 引文
  内容: 千磨万击还坚劲，任尔东西南北风。
  作者: 郑燮
  出处: 《竹石》
  核验链接: https://zh.wikisource.org/w/index.php?title=Special%3ASearch&search=%E9%83%91%E7%87%AE+%E7%AB%B9%E7%9F%B3
- title: 未完成版本
  类型: 原创
  内容: 你不必一次成为最终版本，人生允许迭代，也允许在每次更新后重新定义方向。
- title: 远方的坐标
  类型: 原创
  内容: 未来不是等待被发现的固定坐标，而是由今天每个小决定共同计算出的轨迹。
- title: 逆风参数
  类型: 原创
  内容: 逆风不会取消航程，它只是改变速度、姿态与抵达所需的耐心。
- title: 微小提交
  类型: 原创
  内容: 每天提交一点真实进展，胜过长期保存一个从未运行的宏大计划。
- title: 失败日志
  类型: 原创
  内容: 失败不是删除键，而是一份高代价日志；认真读取它，下一次便少走一段弯路。
- title: 黎明之前
  类型: 原创
  内容: 黑暗无法证明黎明不会到来，它只说明此刻仍需有人守住微光。
- title: 重新初始化
  类型: 原创
  内容: 当旧方法全部失效时，重新初始化并不可耻，真正危险的是在错误状态里无限循环。
- title: 耐心复利
  类型: 原创
  内容: 耐心看似缓慢，却会像复利一样，把微小努力累积成后来难以忽视的力量。
- title: 选择困难
  类型: 原创
  内容: 困难并不总是阻挡你的墙，有时它是筛选真正愿望的过滤器。
- title: 勇气协议
  类型: 原创
  内容: 勇气不是没有恐惧，而是在恐惧仍在线时，依然执行自己认可的协议。
- title: 未来缓存
  类型: 原创
  内容: 不要用全部心力缓存尚未发生的灾难，给未来留下产生惊喜的内存。
- title: 低谷测量
  类型: 原创
  内容: 低谷能测出一颗心的深度，也能让向上的每一步获得清晰刻度。
- title: 愿望编译
  类型: 原创
  内容: 愿望只有被拆成行动、时间和反馈，才能从想象编译成现实。
- title: 新路由
  类型: 原创
  内容: 走不通的道路并不宣布旅程结束，它只是要求你更新路由表。
- title: 慢即稳定
  类型: 原创
  内容: 真正长久的前进，常不像冲刺那样耀眼，却像稳定时钟一样从不缺席。
- title: 自我证据
  类型: 原创
  内容: 不要把全部价值交给外界评分，你每天认真生活的痕迹，本身就是存在的证据。
- title: 试错权限
  类型: 原创
  内容: 给自己试错权限，才有可能接触那些没有标准答案的新世界。
- title: 明日接口
  类型: 原创
  内容: 今天留下的一点秩序，会成为明日更从容地调用生活的接口。
- title: 梦想容错
  类型: 原创
  内容: 梦想若没有容错机制，第一次偏航就会崩溃；真正的坚持懂得不断校准。
- title: 山顶之外
  类型: 原创
  内容: 山顶不是永久住所，它只是让人看清下一片群山的观测站。
- title: 种子时钟
  类型: 原创
  内容: 种子在地下沉默时并非停滞，它只是按照看不见的时钟准备破土。
- title: 行动带宽
  类型: 原创
  内容: 焦虑会占满思维带宽，行动则把一部分带宽重新分配给可能性。
- title: 无人鼓掌
  类型: 原创
  内容: 无人鼓掌的日子最能训练方向感，因为你必须仅凭内心坐标继续前进。
- title: 长期主义
  类型: 原创
  内容: 长期主义不是忍受一切，而是持续把资源投入真正值得生长的事物。
- title: 修复而非否定
  类型: 原创
  内容: 一次崩溃只说明当前结构需要修复，并不等于整个未来应被否定。
- title: 风暴中的核
  类型: 原创
  内容: 外部环境可以剧烈波动，但你仍能维护一个由原则组成的稳定内核。
- title: 希望算法
  类型: 原创
  内容: 希望不是盲目预测好结果，而是在不确定中仍不断寻找可执行的下一步。
- title: 积累阈值
  类型: 原创
  内容: 许多努力在跨过阈值之前都近乎不可见，因此不要用短期回声判断长期方向。
- title: 拒绝比较
  类型: 原创
  内容: 别人的时间线不是你的基准测试，每个人都有不同硬件、数据和起点。
- title: 可逆选择
  类型: 原创
  内容: 面对不确定，先做成本较低且可逆的选择，让行动本身替你收集信息。
- title: 未来的证人
  类型: 原创
  内容: 今天的你是未来的第一位证人，请为那个尚未抵达的人保留一点信任。
- title: 困难分片
  类型: 原创
  内容: 把巨大的困难切成足够小的分片，勇气便能逐块处理，而不必一次吞下整座山。
- title: 重新命名
  类型: 原创
  内容: 不要急着把暂时的停顿命名为失败，它也可能是系统在等待必要条件。
- title: 光的路径
  类型: 原创
  内容: 光并不与黑暗争辩，它只沿着可以传播的路径不断前进。
- title: 边走边明白
  类型: 原创
  内容: 很多方向不是想清楚后才出发，而是在诚实行走中逐渐变得清晰。
- title: 建设者
  类型: 原创
  内容: 抱怨能指出裂缝，建设却要亲手计算材料、承担误差并让桥真正站立。
- title: 时间盟友
  类型: 原创
  内容: 当努力与方向相合，时间就不再只是流逝，而会成为最安静的盟友。
- title: 有限今日
  类型: 原创
  内容: 未来辽阔得令人不安，但今天只有有限几件事；先把它们做好。
- title: 持续在线
  类型: 原创
  内容: 真正的坚韧不是永不掉线，而是每次中断之后都知道怎样重新连接。
- title: 向前的定义
  类型: 原创
  内容: 向前并不总是速度增加，有时它只是停止重复伤害自己的旧循环。
