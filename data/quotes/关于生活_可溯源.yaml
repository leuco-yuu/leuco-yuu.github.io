  内容: 认真对待一餐饭，是承认宏大的生命也必须依靠具体的米粒与火候。
- title: 窗边时间
  类型: 原创
  内容: 偶尔坐在窗边什么也不做，并不是浪费计算资源，而是在校准内心的时钟。
- title: 疲惫告警
  类型: 原创
  内容: 疲惫不是软弱，而是系统发出的告警；忽略它太久，再强的意志也会过热。
- title: 邻人的光
  类型: 原创
  内容: 人与人之间最好的照明，不是炫目的聚光灯，而是在对方暗处留一盏小灯。
- title: 旧物索引
  类型: 原创
  内容: 旧物像时间建立的索引，一次触碰便能跳转到早已关闭却未被删除的页面。
- title: 步行哲学
  类型: 原创
  内容: 步行让身体重新理解距离，也让心明白许多答案并不适合被高速下载。
- title: 温柔权限
  类型: 原创
  内容: 真正的亲密不是无限权限，而是在知道彼此脆弱之后仍谨慎访问。
- title: 午后低频
  类型: 原创
  内容: 午后的低频时光告诉我们，生命并非只有高性能模式才值得被记录。
- title: 善意延迟
  类型: 原创
  内容: 一句善意即使来得稍晚，也可能穿过漫长延迟，抵达一个人最需要的时刻。
- title: 睡眠修复
  类型: 原创
  内容: 睡眠不是从生活中退出，而是让身心在后台完成修复与重建。
- title: 平凡的证明
  类型: 原创
  内容: 日复一日把琐事做好，就是普通人给岁月写下的严谨证明。
- title: 失去之后
  类型: 原创
  内容: 失去会留下空洞，但空洞并非终点，它也可能成为新光进入的通道。
- title: 共同语言
  类型: 原创
  内容: 真正的共同语言，不只是说相同的话，而是愿意为彼此解释沉默。
- title: 生活日志
  类型: 原创
  内容: 不要只记录故障，也记录那些正常运行的日子；安稳本身就是值得庆祝的事件。
- title: 边界之美
  类型: 原创
  内容: 边界不是冷漠的防火墙，而是让爱与尊重都能稳定运行的规则。
- title: 厨房星系
  类型: 原创
  内容: 锅碗瓢盆碰撞的声音，也能组成一个家庭最真实的星系。
- title: 不必满载
  类型: 原创
  内容: 人生不必时时满载运行，空闲不是缺陷，而是创造与恢复的必要余量。
- title: 时间粒度
  类型: 原创
  内容: 当我们把时间的粒度调小，便会发现幸福往往不是一年，而是几秒。
- title: 倾听端口
  类型: 原创
  内容: 倾听不是等待自己发言，而是暂时关闭输出端口，让另一个人的世界完整传入。
- title: 旧路新景
  类型: 原创
  内容: 同一条路走得久了，也会因心境改变而重新渲染出不同风景。
- title: 温度校准
  类型: 原创
  内容: 生活的好坏不能只由效率衡量，还要看它是否保留了人的温度。
- title: 告别程序
  类型: 原创
  内容: 好好告别，是给一段关系写下结束符，而不是假装它从未执行。
- title: 不确定天气
  类型: 原创
  内容: 接受生活的天气无法完全预测，才能把精力从控制风云转向照顾自己。
- title: 微光网络
  类型: 原创
  内容: 每一个不经意的善举都像微小节点，最终可能连接成他人穿越黑夜的网络。
- title: 身体的证词
  类型: 原创
  内容: 身体诚实地记录每一次熬夜、焦虑与放松，它是生活最不善伪造的日志。
- title: 简单响应
  类型: 原创
  内容: 许多时候，生活需要的不是复杂方案，而是一句及时回应和一次真实陪伴。
- title: 今日提交
  类型: 原创
  内容: 不必等一切完美才提交今天；带着少量遗憾保存，也是一种完整。
