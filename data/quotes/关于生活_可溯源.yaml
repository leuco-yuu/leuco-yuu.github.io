  内容: 成熟不是从不犯错，而是为自己与他人保留适度容错，并在故障后认真修复。
- title: 季节版本
  类型: 原创
  内容: 季节从不询问我们是否准备好，它只安静发布新版本，教人接受变化。
- title: 关系的密钥
  类型: 原创
  内容: 真诚是关系最朴素的密钥；技巧可以建立连接，却未必能够长期解密彼此。
- title: 一餐一世
