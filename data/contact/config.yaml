# 联系方式配置文件
# 每个联系方式的卡片信息，后续替换为真实数据即可
# 头像统一使用站点头像；二维码图片放在 qr/ 子目录下

contacts:
  - id: github
    name: GitHub
    type: profile
    icon: github
    profileName: "leuco-yuu"
    profileLink: "https://github.com/leuco-yuu"
    buttons:
      - text: "复制地址"
        icon: copy
        copy: "https://github.com/leuco-yuu"
      - text: "访问GitHub"
        icon: external
        url: "https://github.com/leuco-yuu"

  - id: gmail
    name: Gmail
    type: email
    icon: gmail
    email: "leucoyuu@gmail.com"
    buttons:
      - text: "复制邮箱"
        icon: copy
        copy: "leucoyuu@gmail.com"
      - text: "发送邮件"
        icon: send
        url: "mailto:leucoyuu@gmail.com"

  - id: 163mail
