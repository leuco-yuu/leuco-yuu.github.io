<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联系方式弹窗</title>

  <style>
    :root {
      --bg: #f7f7f6;
      --card-bg: #ffffff;
      --text: #151515;
      --muted: #71717a;
      --line: #e8e8e5;
      --border: #deded9;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
      --radius: 18px;
      --btn-radius: 999px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(0, 0, 0, 0.035), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif;
    }

    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 80px 0;
      text-align: center;
    }

    .page-title {
      margin: 0;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 760;
      letter-spacing: -0.04em;
    }

    .page-desc {
      margin: 14px auto 36px;
      max-width: 600px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    .launcher-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 14px;
    }

    .launcher {
      height: 46px;
      border: 1px solid var(--border);
      border-radius: var(--btn-radius);
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background 0.2s ease,
        border-color 0.2s ease;
    }

    .launcher:hover {
      transform: translateY(-3px);
      background: #fff;
      border-color: #cfcfca;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .modal-root {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(250, 250, 249, 0.74);
      backdrop-filter: blur(12px);
      opacity: 0;
      visibility: hidden;
      transition:
        opacity 0.22s ease,
        visibility 0.22s ease;
      z-index: 999;
    }

    .modal-root.is-open {
      opacity: 1;
      visibility: visible;
    }

    .contact-card {
      width: min(420px, 100%);
      min-height: 410px;
      padding: 18px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transform: translateY(10px) scale(0.985);
      transition: transform 0.22s ease;
    }

    .modal-root.is-open .contact-card {
      transform: translateY(0) scale(1);
    }

    .card-head {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: var(--text);
    }

    .brand-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .brand-name {
      font-size: 24px;
      font-weight: 620;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .close-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #fff;
      color: #222;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease;
    }

    .close-btn:hover {
      transform: rotate(90deg);
      background: #f4f4f3;
      border-color: #d6d6d1;
    }

    .card-body {
      min-height: 300px;
      padding-top: 28px;
    }

    /* 有二维码的卡片：上半部分资料，下半部分二维码+按钮 */
    .qr-card-layout {
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .qr-top {
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 72px;
      padding: 0 4px;
    }

    .qr-bottom {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 22px;
      align-items: start;
    }

    .qr-box {
      width: 170px;
      height: 170px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .qr-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .qr-bottom-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 170px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      flex: 0 0 auto;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 35%, #f1f1f1 0 30%, transparent 31%),
        linear-gradient(135deg, #e9e9e6, #f9f9f8);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .avatar svg {
      width: 54px;
      height: 54px;
    }

    .profile-text {
      min-width: 0;
    }

    .profile-name {
      margin: 0;
      font-size: 25px;
      font-weight: 720;
      letter-spacing: -0.04em;
      line-height: 1.15;
    }

    .profile-id {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.2;
      word-break: break-all;
    }

    .email-layout {
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 34px;
      padding: 8px 32px 0;
    }

    .email-address {
      margin: 0;
      text-align: center;
      font-size: clamp(18px, 4vw, 23px);
      font-weight: 540;
      letter-spacing: -0.03em;
      word-break: break-all;
    }

    .profile-layout {
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 30px;
      padding: 4px 18px 0;
    }

    .profile-main {
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 0 16px;
    }

    .profile-main .avatar {
      width: 78px;
      height: 78px;
    }

    .profile-main .avatar svg {
      width: 66px;
      height: 66px;
    }

    .profile-link {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.35;
      word-break: break-all;
    }

    .button-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .action-btn {
      width: 100%;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: var(--btn-radius);
      background: #fff;
      color: #2b2b2b;
      font-size: 16px;
      font-weight: 560;
      cursor: pointer;
      text-decoration: none;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      background: #fafafa;
      border-color: #cfcfca;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.06);
    }

    .action-btn svg {
      width: 18px;
      height: 18px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(20px);
      padding: 10px 16px;
      border-radius: 999px;
      background: #151515;
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.2s ease,
        transform 0.2s ease;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 860px) {
      .launcher-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 48px 0;
      }

      .launcher-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .contact-card {
        min-height: auto;
        padding: 16px;
      }

      .brand-name {
        font-size: 21px;
      }

      .qr-bottom {
        grid-template-columns: 1fr;
      }

      .qr-box {
        margin: 0 auto;
      }

      .email-layout,
      .profile-layout {
        padding-inline: 4px;
      }

      .profile-main {
        padding-inline: 0;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1 class="page-title">Contact</h1>
    <p class="page-desc">
      点击下面的按钮，打开对应联系方式弹窗。七个弹窗保持同一套卡片形状、间距、按钮与整体排版风格。
    </p>

    <div class="launcher-grid">
      <button class="launcher" data-open="qq">QQ</button>
      <button class="launcher" data-open="gmail">Gmail</button>
      <button class="launcher" data-open="mail163">163mail</button>
      <button class="launcher" data-open="github">GitHub</button>
      <button class="launcher" data-open="facebook">Facebook</button>
      <button class="launcher" data-open="twitter">Twitter</button>
      <button class="launcher" data-open="rss">RSS</button>
    </div>
  </main>

  <div class="modal-root" id="modalRoot" aria-hidden="true">
    <article class="contact-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="card-head">
        <div class="brand">
          <div class="brand-icon" id="modalIcon"></div>
          <div class="brand-name" id="modalTitle"></div>
        </div>
        <button class="close-btn" id="closeBtn" aria-label="关闭弹窗">×</button>
      </header>

      <section class="card-body" id="modalBody"></section>
    </article>
  </div>

  <div class="toast" id="toast">已复制</div>

  <script>
    const iconSvg = {
      qq: `
        <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <ellipse cx="24" cy="22" rx="13" ry="17" fill="#111"/>
          <ellipse cx="24" cy="25" rx="10" ry="13" fill="#fff"/>

      `,

        <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <path d="M8 14v24h8V21l8 7 8-7v17h8V14l-16 13L8 14Z" fill="#fff"/>
          <path d="M8 14v24h8V21L8 14Z" fill="#4285F4"/>
          <path d="M40 14v24h-8V21l8-7Z" fill="#34A853"/>

          <path d="M16 21l8 7 8-7-8 6-8-6Z" fill="#FBBC04"/>
        </svg>
      `,
      mail163: `
        <svg viewBox="0 0 80 48" fill="none" aria-hidden="true">
          <text x="2" y="34" font-size="32" font-weight="800" fill="#c91d1d" font-family="Arial, sans-serif">163</text>
        </svg>
      `,
      github: `
        <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <path fill="#151515" d="M24 5C13.5 5 5 13.5 5 24c0 8.4 5.4 15.5 12.9 18 .9.2 1.2-.4 1.2-.9v-3.3c-5.2 1.1-6.3-2.2-6.3-2.2-.8-2.1-2-2.7-2-2.7-1.7-1.2.1-1.2.1-1.2 1.9.1 2.9 2 2.9 2 1.7 2.9 4.4 2 5.4 1.6.2-1.2.7-2 1.2-2.5-4.2-.5-8.6-2.1-8.6-9.3 0-2.1.7-3.8 1.9-5.1-.2-.5-.8-2.5.2-5 0 0 1.6-.5 5.2 1.9 1.5-.4 3.1-.6 4.7-.6s3.2.2 4.7.6c3.6-2.4 5.2-1.9 5.2-1.9 1 2.5.4 4.5.2 5 1.2 1.3 1.9 3 1.9 5.1 0 7.2-4.4 8.8-8.6 9.3.7.6 1.3 1.8 1.3 3.6v5.3c0 .5.3 1.1 1.3.9C37.6 39.5 43 32.4 43 24 43 13.5 34.5 5 24 5Z"/>
        </svg>
      `,
      facebook: `
        <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <circle cx="24" cy="24" r="20" fill="#1877F2"/>
          <path d="M29.5 25.4l.8-5.2h-5v-3.4c0-1.4.7-2.8 2.9-2.8h2.3V9.6s-2.1-.4-4.1-.4c-4.2 0-7 2.6-7 7.2v3.8h-4.7v5.2h4.7V38h5.9V25.4h4.2Z" fill="#fff"/>
        </svg>
      `,
      twitter: `
        <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <path d="M12 10h7.2l17.2 28H29L11.8 10Z" fill="#151515"/>
          <path d="M34.5 10h-4.2L13.5 38h4.2L34.5 10Z" fill="#151515"/>
        </svg>
      `,
      rss: `
        <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <path d="M12 12c13.3 0 24 10.7 24 24" stroke="#151515" stroke-width="5" stroke-linecap="round"/>
          <path d="M12 22c7.7 0 14 6.3 14 14" stroke="#151515" stroke-width="5" stroke-linecap="round"/>
          <circle cx="14" cy="34" r="4" fill="#151515"/>
        </svg>
      `
    };

    const avatarSvg = `
      <svg viewBox="0 0 80 80" fill="none" aria-hidden="true">
        <circle cx="40" cy="40" r="38" fill="#eeeeec"/>
        <path d="M21 66c3-13 11-19 19-19s16 6 19 19H21Z" fill="#202124"/>
        <circle cx="40" cy="36" r="16" fill="#f3d5bd"/>
        <path d="M21 33c2-14 12-22 24-19 10 2 15 10 14 23-4-8-10-10-16-10-8 0-13 3-22 6Z" fill="#202124"/>
        <circle cx="33" cy="38" r="2" fill="#151515"/>
        <circle cx="47" cy="38" r="2" fill="#151515"/>
        <path d="M35 47c3 2 7 2 10 0" stroke="#151515" stroke-width="2" stroke-linecap="round"/>
      </svg>
    `;

    function qrSvg(seedText) {
      let cells = "";

      function hash(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
          h = str.charCodeAt(i) + ((h << 5) - h);
        }
        return Math.abs(h);
      }

      function finder(x, y) {
        cells += `<rect x="${x}" y="${y}" width="7" height="7" fill="#111"/>`;
        cells += `<rect x="${x + 1}" y="${y + 1}" width="5" height="5" fill="#fff"/>`;
        cells += `<rect x="${x + 2}" y="${y + 2}" width="3" height="3" fill="#111"/>`;
      }

      finder(1, 1);
      finder(21, 1);
      finder(1, 21);

      for (let y = 0; y < 29; y++) {
        for (let x = 0; x < 29; x++) {
          const inFinder =
            (x <= 8 && y <= 8) ||
            (x >= 20 && y <= 8) ||
            (x <= 8 && y >= 20);

          if (inFinder) continue;

          const v = hash(`${seedText}-${x}-${y}`) % 100;
          if (v < 42) {
            cells += `<rect x="${x}" y="${y}" width="1" height="1" fill="#111"/>`;
          }
        }
      }

      return `
        <svg class="qr-svg" viewBox="0 0 29 29" shape-rendering="crispEdges" aria-hidden="true">
          <rect width="29" height="29" fill="#fff"/>
          ${cells}
        </svg>
      `;
    }

    const data = {
      qq: {
        name: "QQ",
        icon: iconSvg.qq,
        type: "qr",
        qr: qrSvg("qq-123456789"),
        profileName: "jkh",
        profileId: "123456789",
        buttons: [
          { text: "复制QQ号", icon: "copy", copy: "123456789" },
          { text: "打开QQ", icon: "chat", url: "tencent://message/?uin=123456789" }
        ]
      },
      gmail: {
        name: "Gmail",
        icon: iconSvg.gmail,
        type: "email",
        email: "jebdessau73597@gmail.com",
        buttons: [
          { text: "复制邮箱", icon: "copy", copy: "jebdessau73597@gmail.com" },
          { text: "发送邮件", icon: "send", url: "mailto:jebdessau73597@gmail.com" }
        ]
      },
      mail163: {
        name: "163mail",
        icon: iconSvg.mail163,
        type: "email",
        email: "jebdessau73597@163.com",
        buttons: [
          { text: "复制邮箱", icon: "copy", copy: "jebdessau73597@163.com" },
          { text: "发送邮件", icon: "send", url: "mailto:jebdessau73597@163.com" }
        ]
      },
      github: {
        name: "GitHub",
        icon: iconSvg.github,
        type: "profile",
        profileName: "jkh",
        profileLink: "github.com/jebdessau73597",
        buttons: [
          { text: "复制地址", icon: "copy", copy: "https://github.com/jebdessau73597" },
          { text: "访问GitHub", icon: "external", url: "https://github.com/jebdessau73597" }
        ]
      },
      facebook: {
        name: "Facebook",
        icon: iconSvg.facebook,
        type: "qr",
        qr: qrSvg("facebook-jebdessau73597"),
        profileName: "jkh",
        profileId: "10001234567890",
        buttons: [
          { text: "复制脸书ID", icon: "copy", copy: "10001234567890" },
          { text: "打开脸书", icon: "external", url: "https://facebook.com/jebdessau73597" }
        ]
      },
      twitter: {
        name: "Twitter",
        icon: iconSvg.twitter,
        type: "profile",
        profileName: "jkh",
        profileLink: "twitter.com/jebdessau73597",
        buttons: [
          { text: "复制地址", icon: "copy", copy: "https://twitter.com/jebdessau73597" },
          { text: "访问Twitter", icon: "external", url: "https://twitter.com/jebdessau73597" }
        ]
      },
      rss: {
        name: "RSS",
        icon: iconSvg.rss,
        type: "profile",
        profileName: "RSS Feed",
        profileLink: "example.com/index.xml",
        buttons: [
          { text: "复制地址", icon: "copy", copy: "https://example.com/index.xml" },
          { text: "访问RSS", icon: "external", url: "https://example.com/index.xml" }
        ]
      }
    };

    const actionIcon = {
      copy: `
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="8" y="8" width="10" height="12" rx="2" stroke="currentColor" stroke-width="1.8"/>
          <path d="M6 16V6a2 2 0 0 1 2-2h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      `,
      send: `
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M21 4L10 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M21 4l-7 17-4-6-6-4 17-7Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
      `,
      external: `
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M14 5h5v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M19 5l-9 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M12 6H7a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      `,
      chat: `
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5 18l1.2-3.2A7.2 7.2 0 1 1 9.2 18H5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M9 11h.01M12 11h.01M15 11h.01" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
        </svg>
      `
    };

    const modalRoot = document.getElementById("modalRoot");
    const modalIcon = document.getElementById("modalIcon");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const closeBtn = document.getElementById("closeBtn");
    const toast = document.getElementById("toast");

    function makeButtons(buttons) {
      return `
        <div class="button-stack">
          ${buttons.map(btn => {
            const icon = actionIcon[btn.icon] || "";
            if (btn.copy) {
              return `
                <button class="action-btn" data-copy="${escapeHtml(btn.copy)}">
                  ${icon}
                  <span>${btn.text}</span>
                </button>
              `;
            }

            return `
              <a class="action-btn" href="${escapeHtml(btn.url)}" target="_blank" rel="noopener noreferrer">
                ${icon}
                <span>${btn.text}</span>
              </a>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderBody(item) {
      if (item.type === "qr") {
        return `
          <div class="qr-card-layout">
            <div class="qr-top">
              <div class="avatar">${avatarSvg}</div>
              <div class="profile-text">
                <p class="profile-name">${item.profileName}</p>
                <p class="profile-id">${item.profileId}</p>
              </div>
            </div>

            <div class="qr-bottom">
              <div class="qr-box">${item.qr}</div>

              <div class="qr-bottom-right">
                ${makeButtons(item.buttons)}
              </div>
            </div>
          </div>
        `;
      }

      if (item.type === "email") {
        return `
          <div class="email-layout">
            <p class="email-address">${item.email}</p>
            ${makeButtons(item.buttons)}
          </div>
        `;
      }

      return `
        <div class="profile-layout">
          <div class="profile-main">
            <div class="avatar">${avatarSvg}</div>
            <div class="profile-text">
              <p class="profile-name">${item.profileName}</p>
              <p class="profile-link">${item.profileLink}</p>
            </div>
          </div>

          ${makeButtons(item.buttons)}
        </div>
      `;
    }

    function openModal(key) {
      const item = data[key];
      if (!item) return;

      modalIcon.innerHTML = item.icon;
      modalTitle.textContent = item.name;
      modalBody.innerHTML = renderBody(item);

      modalRoot.classList.add("is-open");
      modalRoot.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modalRoot.classList.remove("is-open");
      modalRoot.setAttribute("aria-hidden", "true");
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");

      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1400);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("已复制：" + text);
      } catch {
        const input = document.createElement("textarea");
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
        showToast("已复制：" + text);
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    document.querySelectorAll("[data-open]").forEach(btn => {
      btn.addEventListener("click", () => {
        openModal(btn.dataset.open);
      });
    });

    closeBtn.addEventListener("click", closeModal);

    modalRoot.addEventListener("click", event => {
      if (event.target === modalRoot) {
        closeModal();
      }
    });

    modalBody.addEventListener("click", event => {
      const copyBtn = event.target.closest("[data-copy]");
      if (!copyBtn) return;
      copyText(copyBtn.dataset.copy);
    });

    window.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeModal();
      }
    });
  </script>
</body>
</html>
