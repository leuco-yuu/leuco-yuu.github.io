# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.config/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps   = 0
temperature = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "ToolName" or "ToolName(glob)"; '*' matches any run, '?' one char.
mode  = "ask"
# deny = ["bash(rm -rf*)", "bash(git push*)"]   # hard-blocked in every mode
allow = ["explore", "multi_edit=layouts/_partials/content/post-meta.html", "edit_file=layouts/_partials/content/post-meta.html", "edit_file=themes/hugo-narrow/assets/css/prose.typography.css", "edit_file=layouts/_partials/navigation/header.html", "edit_file=themes/hugo-narrow/layouts/_partials/content/card-base.html", "multi_edit=layouts/posts/list.html", "edit_file=layouts/posts/list.html", "bash=cd \"D:\\Blog\\leuco blog\" && hugo --quiet 2>&1", "edit_file=layouts/_partials/ui/dock.html", "multi_edit=hugo.yaml", "edit_file=content/_index.md", "edit_file=content/tags/_index.md", "bash=find \"D:\\Blog\\leuco blog\\assets\\css\" -name \"custom.css\" 2>/dev/null", "bash=cd \"D:\\Blog\\leuco blog\" && rm -rf public && hugo 2>&1 | tail -5", "bash=cd \"D:\\Blog\\leuco blog\" && echo \"=== CSS file ===\" && ls public/css/custom/post-series* 2>/dev/null && echo \"=== series-sidebar in CSS ===\" && grep -c \"series-sidebar\" public/css/custom/post-series.min.*.css 2>/dev/null && echo \"=== series-card in HTML ===\" && grep -c \"series-card\" public/posts/basic-environment-setup/index.html && echo \"=== series-sidebar in HTML ===\" && grep -c \"series-sidebar\" public/posts/basic-environment-setup/index.html && echo \"=== series-left in HTML ===\" && grep -c \"series-left\" public/posts/basic-environment-setup/index.html", "bash=cd \"D:\\Blog\\leuco blog\" && echo \"=== No series leaks ===\" && grep -c \"series-card\\|series-left\\|series-sidebar\" public/posts/ensemble-learning/index.html && echo \"=== With series has ===\" && grep -c \"series-card\\|series-left\\|series-sidebar\" public/posts/basic-environment-setup/index.html", "bash=cd \"D:\\Blog\\leuco blog\" && grep \"series\" content/posts/ensemble-learning/index.md 2>/dev/null | head -3", "bash=cd \"D:\\Blog\\leuco blog\" && grep -n \"series-card\\|series-left\\|series-sidebar\" public/posts/ensemble-learning/index.html", "bash=cd \"D:\\Blog\\leuco blog\" && find content -name \"ensemble-learning\" -type d 2>/dev/null && grep -r \"series\" content/posts/ensemble-learning/ 2>/dev/null | head -5", "bash=cd \"D:\\Blog\\leuco blog\" && find content -name \"*ensemble*\" 2>/dev/null | head -5", "bash=cd \"D:\\Blog\\leuco blog\" && find public/posts -name \"ensemble*\" -type f 2>/dev/null | head -3 && find public/posts -name \"ensemble*\" -type d 2>/dev/null | head -3", "bash=cd \"D:\\Blog\\leuco blog\" && find content/posts -name \"*.md\" -exec grep -L \"series:\" {} \\; 2>/dev/null | head -5", "bash=cd \"D:\\Blog\\leuco blog\" && find content/posts -name \"*.md\" -exec grep -l \"series:\" {} \\; | wc -l && find content/posts -name \"*.md\" ! -name \"_index.md\" | wc -l", "bash=cd \"D:\\Blog\\leuco blog\" && cat public/css/custom/post-series.min.*.css", "bash=cd \"D:\\Blog\\leuco blog\" && rm -rf public && hugo --quiet 2>&1 && echo \"--- sidebar HTML ---\" && grep -o 'class=\"series-sidebar[^\"]*\"' public/posts/basic-environment-setup/index.html && echo \"--- card HTML ---\" && grep -o 'class=\"bg-card border-border rounded-xl border[^\"]*\"' public/posts/basic-environment-setup/index.html", "bash=cd \"D:\\Blog\\leuco blog\" && echo \"=== card class ===\" && grep -c 'series-card' public/posts/basic-environment-setup/index.html && echo \"=== left class ===\" && grep -c 'series-left' public/posts/basic-environment-setup/index.html && echo \"=== sidebar class ===\" && grep -c 'series-sidebar' public/posts/basic-environment-setup/index.html && echo \"=== no flex-row ===\" && grep -c 'lg:flex-row' public/posts/basic-environment-setup/index.html", "bash=cd \"D:\\Blog\\leuco blog\" && echo \"card=$(grep -c 'series-card' public/posts/basic-environment-setup/index.html) left=$(grep -c 'series-left' public/posts/basic-environment-setup/index.html) sidebar=$(grep -c 'series-sidebar' public/posts/basic-environment-setup/index.html)\"", "bash=cd \"D:\\Blog\\leuco blog\" && grep -c 'series-card\\|series-left\\|series-sidebar' public/posts/basic-environment-setup/index.html", "bash=cd \"D:\\Blog\\leuco blog\" && rm -rf public && hugo --quiet 2>&1", "bash=cd \"D:\\Blog\\leuco blog\" && echo \"CSS:\" && grep -c \"series-sidebar\" public/css/custom/post-series.min.*.css && echo \"HTML page with series:\" && grep -c \"series-sidebar\" public/posts/basic-environment-setup/index.html && echo \"HTML page without series:\" && grep -c \"series-sidebar\" public/index.html"]
# ask = ["write_file"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
